body:
  text: 舊解徒知慕經圓妙不能曲順經文深研本有圓妙的旨而乃傍引他家彷彿圓妙之義以會釋之故不惟文義了不相合且將本經元來脉絡悉成紊亂而首尾不相通貫故今新疏但惟奉順佛經曲搜本意令其脉絡貫通則經中本有圓妙深意豈他家所能比擬故名正脉意在此也然解中判科釋意大異舊說恐聞者遽成驚怪或起嗤笑故於未解經前懸遠出示其中要義導人樂玩不致廢擲也章門有二一申己解由二法古提綱今初申己解由者斯經流通震旦自唐及今千有餘載領其義理形於文辭者固不可勝紀而部帙名家幾滿十數天如取九家著作而會通去取補以己意目為十家會解自謂具眾美而斷猶豫義無不盡人亦服其該博而復樂其簡要切中時機是以交口讚善而兢相講習自元末及今二百餘年海內慕楞嚴而講聽者惟知有會解而他非所尚故尋經旨者須從會解中通釋之有不通者則歸罪於經之玄奧難明罕有敢疑註家通達之未盡也間有略疑議者則叢口交謗如悖逆人此緣尊習之久恒物大情無怪其然也若是則解家已多而會家已定從之者又紛然宜無復解而今乃復為是解者必別有由不首申之何以導人進覽乎又分為四一曰制疏始終二曰略遮疑慢三曰較釋功過四曰略剖是非今初制疏始終者予初業儒不知佛法為何物時或加謗自業師香林公警以永嘉著作忽於如來若識久迷之父母大加痛悔即誓出家然未有深解也無何入京庠備員尋求竺典值友人西野郭居士惠以是解如不涉海而得摩尼欣慶無量於中恍惚有省解處而實不盡通達時詣青塔無紋師座下討論之及徧歷暹公等諸師講肆兼同參輩相與折衷得味漸深嗜好無厭頗領萬法惟心之旨然智見多局促於會解註文無敢逾越也自是旁通於性相諸典放曠於法華義句華嚴疏鈔飽飫台首之宗樂其文義雙暢無少留難心光漸啟迴視會解遂覺其識見未備臆說多恣與二大老之家法頗不相似自是儒業䇿之則意倦釋典對之則神清心專志定夢出家而生淨土者月常十餘番忽遭骨肉凋敗屢經喪葬乃至丁內艱時居士周姓者請鎮國寺過夏與諸上人講四書時彰德古風上人出單傳門下嗣法小山諳練宗旨未出世為人遂強其交易而講再四乃可相與涵泳四家頌古三師評唱頗覺胸次豁然忘言絕思當下即是虗懷宴如山河人物俱如影象一日詣城中一勳舊曹公家東軒書舍中偶值無人攝念靜坐移時見架上會解一帙隨取展玩不知是何境界忽然眼睛湛朗心竅畫開於如來所說周迴曲折無不洞見譬如平日在一大宅中幽房暗室曲巷迴廊東西莫辨前後難明今乃忽如升一最高之臺展目之間於中纖悉委曲無不備見諸註有謬戾本經如執繩墨較曲直分寸難隱於是悲欣交集就經展拜如親對如來身毛皆竪自誓畢竟出家願祈壽年註經遺世矣數日間值潞安庠生韓子希曾酷好楞嚴二十年徧歷講師無悅其意者遂至予前申數難悉與通釋韓已異之及予反難韓遂瞢然莫曉一詞莫措乃大驚服拜請褁糧謀住欲延歲月以徧討精微予知其大家有太行禪竇可以靜居以遂出家註經之事即吐其意令先迴俟之韓不勝慶幸予次年如約至即下髮誓閱教十年以利其器時萬曆四年丙子冬十月也因韓子問答成楞嚴通會四卷寫本未刊功多閱教越四載南遊不果迴住北董鎮又二載為李通府荊山公請住法住寺建華藏閣居之復越四載念十年之約已滿猶未註疏躊躇間寺眾多病不安予祝云願我一身代之隨即病逾半月垂危眷屬圍視予在昏沉中覺有人提臂警云佛來矣予驚起跪西仰視提警者觀音也見佛立於中二大士夾於左右皆黃金色光明恍朗各丈餘予即知其接引往生遽云往生至願奈楞嚴舊註雜亂未註疏耳聞佛琅然語云誠然雜亂語畢即見三聖皆迴身西去猶瞻望後身金背及青螺後髮渺然漸遠隨開目身汗如雨咸問慰之予備述所見仍曰予已給假註經且得不死汝等勿慮也眾咸念佛聲動屋宇時萬曆丙戌夏六月也尋漸平復寺眾果自予寢病時頓安予感斯瑞大警至冬十月禮懺禱觀音加被遂命筆科經至歲終而科成次年春安慶賢王招住城西南隅報恩堂棲遲十載其間人事及內外講期一切不發而註經朝夕亦無少輟至萬曆丙申冬而疏成次年丁酉仲春瀋藩國主命五臺蘆芽山飯僧遂於蘆芽過夏而製斯懸判因紀歲月以見著疏之始終焉二略遮疑慢者非敢要人之敬信也良以三疑在念七慢存心極能礙人之虗懷阻人之納善於斯疏釋必不能隨喜覽受而或別生譏議何以成結緣之益乎故略遮之以勸隨喜耳予註疏時經日既久難盡隱密風聞而交謗者不可勝紀亦有面斥之者其略云斯經古人已解多學悟兼濟之大人言從證據理出自心故曰後有作者未之或過也子何人而敢是非古人譬始操斧者輙笑公輸纔調音者遽凌師曠豈免智者之笑而末學弗從將貽愧之無已請依予言速己之為愈也予徐謂曰古人解盡後人但宜遵之而不容復解此誠至教予當叩謝但有一問敢對長者申之乎即今會解中十家皆出一時耶亦有先後耶彼曰世代相次前後千年安謂一時予曰既有先後則最初第一家解者應為古人即應解盡而第二家正當後解之時全是今人笑古人解之未盡即應智者譏之末學悖之何亦竝行而不悖乎何況今十家之解皆竝行之乎何又反謂會解最後者為獨善乎昔清凉謂聖旨深遠總遮斯難子其未究彼文良以法義無盡佛語甚深若一人解之即盡何謂法無盡而語甚深乎彼引身因各說佛許無差此據圓通異門佛明不別由此無礙義推則雖百論竝陳何妨隨見以共光法施乎子但究其義之短長稽其理之當否不應以古人已解而為拒也彼復救之曰諸家解雖疊出異說多岐是非未定容許會通今已經天如集諸說而辯別之去取精當至論已定況今宗習已久帖然不疑何復為此惑亂人心乎答長水作義海時前已有數家之解而長水命名義海豈不自以為收眾流而集統要乎且海之取象尚表其諸義大備無復遺餘矣況入藏已久誰不習定何後世復有會解方為定論乎是義海未必收義之盡也夫會解曾不以義海為足而復敢更解今何遽以會解為足而不敢更解乎且子謂人已習定帖然不疑自子言之耳此前已有管見指謫數條而非議之已成傳誦近聞南都有三槐師者非之為甚每講全不從於會解惟說本文人不盡非從之者眾又聞蘇州有人未詳字號廣辯諸註之非已刊而未見大行他如月川之別眼澄印之懸鏡皆各出己見而非有局於會解但皆少分自在之說未據全文而大飜舊案近亦有士大夫奉內教而具眼目者往往愛經之無上而患註之未善是足驗佛法深遠寂義難窮豈一會解所能發盡特子之智出會解之下而無超拔之見豈可強人人皆如子乎彼更怫然不悅曰古人著述者皆有悟證或原是聖流故宜遵之今子一介凡夫別無異行傳聞不滿人心者未必全無而顧為此不思議事我終不之信也予曰雖佛至聖亦不能令人盡信同世興謗者無數況異時而異地者乎子如不信一任不信而謂我非聖無異行且不盡滿人心迹此數語未足與議也子豈謂古之聖智者皆存聖凡之見而亦必為顯異之行以悚動於世乎且佛以四聖真實之語不但說人人皆當作佛而更明眾生本來是佛有不能信領者則責之曰薄德少福人不自信作佛故祖師門下患人高推聖境自輕退屈極力以剷斯惡見每每抑古揚今信口道一句子便謂超佛越祖之談意在聖凡情盡魔佛一如甚至呵佛罵祖豈得已哉第緣人人為聖凡之見所覆偎鄙陋弱無丈夫氣則何以負荷祖佛事業故為是越格之激揚也是則丈夫兒尚當自信是佛作佛而順佛語以發經本旨吾何以非聖為歉哉子又疑我無諸異行豈知牛頭馬祖未悟時各標異行而悟後無不改轍乃知不必異行中求一帶祖門皆重平實饑飱困睡悉謂玄微運水搬柴咸推妙用且九峯謂紙衣舍利無數不如當時道得一句黃蘗見羅漢神通悔不打折脛骨古人惟重智徹般若而骸於異行神通者庸夫之見也且眾生善根悉不可測祖師警人疑慢亦云吾早曾經多劫修不比等閒相誑惑子無宿命神通祗是彷彿見聞人之現生事迹安知人億劫之修哉如來金口親謂信般若者已於百千佛所種諸善根況斯經醍醐至味能信解之與眾發明吾豈敢以自輕哉子不能自信信人終至於慢人自慢是誠大可惜也且人事是非難定人言真偽無憑祖師處世業緣飄鼓是非莫迯往往遭時貶罰如妙喜石門等事迹相類者無數豈盡滿於當時之人心耶由此評量則子之言豈為𠃔當大抵娑婆弊惡常態如斯今子獨推尊於古人祗為其生不同時也子若與彼同時則無以異今日安能免於子之疑且慢耶三曰較釋功過其人聞說顏色始定愧謝予曰承教非但不復疑慢於子亦不自疑慢矣但有一意竊所未安請更伸之夫凡著述因修者易創始者難諸師創始製疏吾輦資之以曉解經義佩德不少聞子亦十年涵泳於註文之下而後方起別見則亦被諸師之澤不淺今一旦悖之揚己之智以掩諸師之美子其忍為之乎予撫掌笑曰子知其小未明其大且所謂揚己之智掩諸師之美二說皆非也子惟感諸師資發之德而蒙昧遮護曾不念如來無量僧祇之至恩在所當報不應以諸師為礙而避過不敢也故予凡有一隙之明窺見佛經或隱覆晦其妙旨或支離失其本意則日夕不安愧負佛恩凡以乖佛法旨則捐道脉而誤眾生豈忍坐視而不建白明正其何以報佛至恩哉念惟在此非區區揚己之智也且子謂掩諸師之美此語尤非予之作疏諸師有毫髮美處在會解者則顯標字號而直書之未甞暗攘以為己有也有不當者則略之而不復言此非掩其美也泯其是非不復為智者所指謫也間有似是而非恐人不能決於取捨或復大義所關不得已而當辯者但以舊註二字代其字號不欲顯其人也不如是則終將掩佛旨而屈經義子不忍掩諸師之美寧忍晦如來之妙乎當知違諸師之註其過則淺掩如來旨義其過甚深以即障眾生之智眼塞學者之悟門而辜盡佛恩故也又護諸師之註其功則小闡如來本意其功則大以即開智眼啟悟門而真報佛恩也且師之作養弟子豈欲其智盡出於己之下乎設有此心即非明師不足尊也故宗門謂養子不及父家門一世衰又父聞子徤恨不殺身凡以其心之公於為法而不私於顯己也縱予因初閱會解於諸師亦有師資之分而能增盛所傳補全遺業雖當仁不讓略辯是非於一時實幹蠱無愆永泯瑕疵於百世豈諸師本皆赤心為法之高賢何至但私於顯己而反不喜於光大其法乎吾以是而自信諸師必不深咎於是疏矣子將以為何如四曰略剖是非者其人至是乃驚惕曰如來本意妙旨豈容一毫隱屈眾生智眼悟門安可一日不開但以不敏亦久聽習會解殊不覺其有斯欠闕而聞子作疏實不信其能更增明今承示此實大驚惕竊恐未必其然耶子疏隨文長廣恐一時難徧敢請略示大端別其一二得失使我信及然後進領於全疏爾予承斯問斂袂凝神者久之喟然嘆曰此其難言也哉昔清涼申疏別意亦表難言其略曰若是非混同則掩明實而誤後學若乖差指出則黷心智而益是非故撫心五頂抑托三尊不獲已而為也吾不敢妄擬清涼而籌慮難言實類是矣今亦仰憑三寶慈威略申一二夫舊解無乖何勞改作正緣未的故此重煩但願深諒予心萬不獲已非敢逞是非之惡念也能少加察脫有相契合處則將慶幸無以為喻矣今略開三條以見大意第一多種不相應迷此復有二一者問答不相應阿難最初問妙奢摩他三摩禪那譯人全存梵語未翻華言意令智者據經前後本文兼較他文同異量定其意爾今據阿難明敘所恨多聞致誤已彰捨解求定之情又惟特請佛所修持亦顯厭權就實之意則知所請決是一乘圓融妙定也諸師以平日所知圓定無有過於天台三止觀者又復眩於經未來時梵僧懸記止觀同於楞嚴之語主乎先入之見輙謂所請決不出此且以止順於定而又偏取三止釋之此即一大迷也蓋凡問處隱略未彰不可造次臆斷須察下文如來答處反推之而意可得也以如來鑑機必問答相應而不相悖也今阿難所問果即天台三止則如來下答辭義須即與三止功夫相似而註家仍當指結何處是體真止何處是方便隨緣止何處是息二邊分別止今細揀經文了無如是義相而註家亦不更銷歸前問至於徵心顯見諸文亦不明其與三止有何干涉豈問處原是三止而答處全不相應則是如來錯答問端何以為鑒機之教又即使如來所答全與三止相應當亦墮於天台所檢過中以彼明言止觀偏取如隻翼單輪不能遠到豈佛會問答反出天台之下耶此更不通之甚也二者科釋不相應迷此則不但迷於經文即於自所科釋亦多自相矛盾如舊解雖不細分小科亦略分於三大科一曰見道二曰修道三曰證道初科既云見道即應未及說於修道而修道須有待於下科及至釋文往往搜尋三觀應當即是修道其實經文元無如是語脉只是文外強判而順文豈有教人修三觀之語縱取一二相似之文附會說之殊無情謂近亦有不撥見道之科而却開大段以硬派為三觀者不思見道者開悟理性之謂也三觀者修進功夫之事也既說止觀即是修道何須判成見道分哉又若此處早是修道即是如來但教眾生從三觀而修至下耳根圓通又何用哉客曰吳興有通請別請之判前之三觀恐是應其通請深心所修後之圓通應其別請初心方便爾答審如是即應通前俱科為修分而於修分復分為兩科一應通請之修二應別請之修方成彼說何為同是修義而乃一科為見道一科為修道乎且既分乎淺深二修則初心者必先修圓通後修三觀敢問修圓通者至何位次始是深心方可修三觀乎今據菩薩自敘從初入流乃至寂滅現前了無接修三觀之相而如來乃謂此根初解先得人空按位當至七信齊小羅漢而菩薩聞所聞盡似當此位又曰空性圓明成法解脫按位當至八九信位已超小乘無學而菩薩空所空滅似當此位又云解脫法已俱空不生按位當至十信滿心後判無生忍位按位即當初住而菩薩寂滅現前即此位也是尚未至於深心乎何亦不見接修三觀之語豈更在於後位方修耶然菩薩此位已超世出世間發三科無邊妙用豈天台所說三觀尚非此等菩薩所能修乎而今之習三觀者皆初住以上之菩薩耶是大不通也客救曰彼所謂通者通十方可修也所謂別者別對此方之機也答曰諸門通對十方之機文殊皆了揀令人捨之耳門別對此方之機文殊獨選令人取之今三觀若是十方通修之法非是此方對機之門即屬文殊所揀應捨之而不必修且如來何於最初即以詳說不對機宜之法乎是又不通也又救曰彼言通者非通他世界也或但通此娑婆深淺位人均可修之而言別者但局初心也答曰若依此方論通則仍是耳門良以如來密指耳根為十方薄伽梵一路涅槃門文殊明選耳門亦云此是微塵佛一路涅槃門下復顯其三世如來通修之法又揀諸門云非是常修學淺深同說法反顯耳門乃是通常可修之法淺深同用之門誰謂圓通但局淺位而非深位之所修耶又三觀即通淺位可修是亦初心方便何必又指示於耳門且耳門是深淺通修之法經有明文而三觀通於淺深楞嚴中何文可證耶當知迷性定為止觀而輕圓通為淺修者皆此等判辭以為迷根矣痛宜刮洗之然復有兩種不分辯一者說理說行不分辨蓋如來破妄心指妙見四科明性常住七大顯性周圓又十惑三續之本虗四義四相之元妙如是乃至圓彰三藏是皆但以談吾心本具之妙理而實未及開行門立觀法也何諸註競判三止觀耶然則理性與觀行尚無分辯安望其發經幽指哉二者教悟教修不分辯蓋凡理性不明解悟未發則方與種種斷疑重重啟悟頗費巧辯委曲誘引而當機方且半疑半信忽悟忽迷又且轉辯轉深愈窮愈妙直至四卷半文此理方便圓明初成解悟是則以上經文方以教其解悟而實未及張設觀門教其進修註家何敢擅專亂指觀門令其修習乎且佛意必待圓解既開正信已定當機自請修進之門方以別指耳門為入此理之妙門仍更推選叮囑戒其不可雜修諸餘方便今何於未指耳門之前亂立三觀以雜亂人心耶若此而不謂之公抗佛言謬傳佛旨吾不信矣譬如國王將有事於東征遣一使臣宣傳敕命召令諸將聚集闕下聽候指示廟算神謀以決東征之勝使臣妄傳諸將即時起行速往西征久之王問使臣諸將何以不至使臣對以彼日傳命即令速往西征久矣王大震怒深怪使臣錯傳所命此亦如是佛欲專令行人修耳根圓通如王將有事於東征也乃先開其妙解令悟本理以為圓通入處如王先欲宣示廟算神謀決東征之勝註家於未說圓通之前輙立三觀令其修習如使臣妄傳所命令其速往西征也由是觀之其為錯誤妄傳也必矣大抵既釋佛經即宜確尊佛語佛本不曾顯立觀門令人修習何緣妄為指授更不闕疑耶客曰諸師剖判三觀亦惟據己見得此處可為空觀即判為空觀等亦如王索先陀智臣了達奉之不錯何必如來顯言止觀而後為觀耶答審如是則是佛雖不曾顯立而實意含諸師智臣能了達之今請不必諍此意是否但問此之三觀當在何時修耶為復預於圓通前修耶正當圓通中修耶更於圓通後修耶若於圓通前修則前文即是修道何判見道又三觀應是初心方便圓通當是深心何圓通又名初心方便若復正當圓通中修則聞性本取其體無分別但一反聞單刀直入故首廢六識不用覺觀思惟偈云覺觀出思惟身心不能及今若加以三觀則依舊思惟覺觀安能離於六識然則如來首破六識是不當也若於圓通後修則其謬當如前深淺位中所辯是則三時既皆無有用處何得誣佛意中有同天台之三觀耶又彼智臣真解王意不差不謬則王當更無改令即應佛於後文請修之時惟指前文三觀令修何必別說反聞為修法耶今既別說而不用三觀足驗前但開示性具理體非含三觀而諸師豈真輪王之智臣哉客曰既全談性具之理而非談三觀如來何故自呼為奢摩他而又明其是微密觀照耶答我非撥其畢竟不是止觀以阿難原本問定而如來原本答定則夫止觀定慧何違於經但此中說定說觀名似同於常途而義實逈別天台三觀實非其類故今反復但明其不是天台止觀而已非竝其本定本觀而總非之也良以奢摩他微密觀照若以天台觀意會釋則甚為障隔經之本旨請申明之一者以修障性蓋經初三卷半文佛本發揮性定而諸註竟以天台修意會釋之則何能使人頓領性定而識取本有家珍耶客曰天台三觀專明性具圓理極斥權乘偏漸何言其屬權宗而全墮修成耶吾未之聞也答我亦非是斥天台為權乘而責其偏墮於修成蓋此師於如來禪中亦比他家殊勝所說觀門義亦圓妙雅合性宗但較之今經旨趣逈別良以台宗三諦三觀三止敵體相對而立至於本具理體全在三諦境中而三止三觀但是依性所修之定非即說性為定也今經最初三卷半文發揮自性本具圓融不動之體即是奢摩他定而領悟照見於此者即是微密觀照故此中語解語悟則誠有之而修習全未涉也今註家鹵莽不加研究而竟以修習止觀之意判之則學者何由而知其為性定哉客曰承斯指示研味經文是誠說性而未說修然則三如來藏作天台之三諦可乎答諦者理也境也若謂為三諦則猶近之而不甚遠以諦境原擬性具之理而立如人為父母畵像必相似焉至於三止三觀則是依諦理所起修習功夫如對畵像祭祀恭敬思想今經所示三如來藏乃如父母現在生活本身尚非畵像可以全同至於祭拜思敬有何干涉耶客曰三諦固說性具之理三如來藏亦說性具之理何得三諦但如畵像而三如來藏便如本身耶答子如不達此意則孤負楞嚴多矣夫三諦但是大師為行人懸擬自心微妙圓融之相立真立俗立中而體會須用三觀三止想像思修久久方到不思議境是其初門若離六識覺觀思惟莫可措心也今三如來藏全不同此以其的實本體即是眾生現前六根中見色聞聲無分別體故佛最初開示首先破除六識不用一切思惟懸想之心次乃即於現前眼根中竪指伸拳覿面指出朗然湛然無分別見性為心又復曲指飛光顯其本不動等皆是令其當面親見自心故阿難初悟自敘如失乳兒復見慈母豈不同於父母現在親身相見何勞畵像思想哉若捨父母現身不行禮敬反拜畵像是大顛倒是則以三如來藏為三諦尚猶不可何況迷為三止觀乎客曰三如來藏是展轉入於深妙圓融之極理何得言最初所示見性即是其體乎子笑曰子之迷根其在是乎諸師正由高推後之藏心而不達其即前初示見根等性體無有二直謂離根性而別有所以修時更不用根性却擬藏性立三諦而起三觀以為圓妙不知依舊落於識心覺觀思惟之境失盡經旨孤盡佛心今請以喻明之譬如金獅子被泥所塗金體全隱忽有智者欲以金體顯示於人將其眼睛擦透露出金色則人莫不喜躍更求擦之由是漸次大開全體光明熾然照耀然終與初擦眼金無有異色亦無異體由斯喻以詳經旨炳然可見則知三如來藏雖極開顯圓融全體大用其與初顯根中見性安有二體特以言不頓彰取次發揮從微至著亦如擦金然也又當知見聞等性但是藏心之偏名而實無偏體如祖師直指人心亦曰在眼曰見在耳曰聞確然是斯旨也故佛答請修教其旋倒聞根所聞根性即是三如來藏性豈有異體耶客曰若是則三諦尚非三觀有何交涉而梵僧何以預傳斯經同於天台三觀答此有兩意推度一者西天東土人智昏明亦多彷彿焉知梵僧不惑於似是而非耶二者彼或但謂略同天台三諦則其言非謬豈必謂其全同三觀乎特是後人承虗接響而謬成三觀耳非梵僧之過也客曰阿難問成佛妙定佛答必是圓定則奢摩他三摩禪那須是舉一即三言三即一方始為圓今何三名各開安得為圓定耶答舊見溺人原本非淺何怪子之深惑耶良以前人性修既不能分而堅謂決同天台三觀又見斯定亦有三名更不研審甄別其文其義為同與否但見一名輙補為三強謂舉一即三言三即一秪欲附會台宗圓妙之像而已跡此而論不但不知斯定所以為圓之本旨而台宗應亦未通達也蓋台宗三觀要如摩醯天眼不縱不橫方始為圓蓋三皆頓具而無前後故非縱三皆互攝而不竝列故非橫今處處兼齊不明統攝全墮於橫是則台宗尚未徹知安望其明斯經旨耶且台宗中三觀舉一即三言三即一乃大師親口自說非假傍人註釋今據如來親口竝不曾說奢摩他等三名有斯義焉是皆後人不達斯定圓旨全不係於三名互具妄擬台定而立斯見也客曰斯定取何意為圓極耶答三如來藏顯然明白先由次第開顯後乃統示圓彰皆其性本具足非由修習而然若就此而明其舉一即三言三即一非縱非橫極為𠃔當而圓融極旨亦未有過於此者何得捨斯義而謬取三名兼具為圓耶客曰的據佛心約何義而立三名乎答麤據問處三名似乎無異眾典尅求答處三義自見宛爾逈殊當知如來約取大定者初中後三時而立此三名耳謂約最初開解本具性定為奢摩他約中間入此性定為三摩提約最後住持修證性定為禪那客曰定之圓旨既惟在於三如來藏今經奢摩他中獨有三藏應惟奢摩他獨具圓意後二名中無有三藏後應不圓答諸家之解前後不相通者正同子之所惑將謂後之所談全非前之所示不知奢摩中是教悟此本有三如來藏三摩提中是教入此本有三如來藏禪那中是教住持修證此本有三如來藏始終通一藏性豈前有而後無耶若後之所入所證非前藏性則入證之前何勞廣陳藏性而解悟之後所入所證更是何性乎大抵舊之解家於經後分多不顧前如談三藏已早不達其即前初示之根性及說圓通何曾明其但入藏性及陳諸位又豈知其牒圓覺而修證藏性乎不思阿難既以華屋喻前藏性則圓通所以進華屋之門而五十五位所以升華屋之堂而入華屋之室也豈離前華屋而他有所適哉是則始終既惟一藏性則始終惟一圓融性定而已何謂前圓而後不圓乎辯不相應已竟二者多種不決定迷此復有二一者破識不決定夫一大時教權實攸分全係於用識與不用識也正以眾生背涅槃而永沉生死全由身心二皆錯認故圓覺云妄認五蘊四大以為身相緣塵分別以為心相是雖二皆錯誤然身之錯認人或易曉心之錯認人所難知故六識非心豈惟界內人天所不覺知雖出世二乘亦未了達至於權教菩薩雖知別有賴耶而所取以為觀慧之體者亦不能外此六識所謂以生滅心為本修因終不能取常住果是以權教極果但齊圓之二行故斯楞嚴妙旨豈惟深處難信難解即此最初破識一節即展轉猶豫不能成決定信展轉迷混不能成分明解也客曰習楞嚴者誰不知其最初破識何有難信難解之相答子若深信朗解何不覺舊註之非曰請示之曰如佛問阿難最初緣何發心而阿難答以緣佛相好發心是佛但欲取其緣相之識破其非心而已非責其不當執相好為實有也舊註輙斷之曰見相實有生滅宛然緣此發心安趨常果此若是佛本意則佛向下即當破三十二相不是如來仍戒不當執為實有不當緣此發心此註方為不謬今向下了無此意豈非大錯又引後文以生滅心為因不獲常果證之不知彼文正惟斥乎用識之非豈是責其執相之過是其前後總迷盡將破識之旨轉為破相之宗豈非迷混何曾朗解破識非心之正意乎會解列此註於前而亦不言其非後乃補曰阿難見相乃緣塵分別之見其所發心即妄想攀緣之心後文七徵八辯重重逐破者此也夫既知破心便非破相何又竝取破相之註乎是雖似知而亦未的故為是兩岐之不決也豈非猶豫而未成真信乎且又不當將前在面之眼誤濫後之見性而謂八還辯見亦同七徵逐破且又將見性坐以緣塵分別之名却不知緣塵分別獨識有之而佛所顯見性乃白淨無記竝無緣塵分別之用如佛云但如鏡中無別分析是也此皆法相不明混濫之極差錯非小無暇竝明今且明不知破識之故舊註又曰阿難厭多聞而欣妙定如來欲談是義先詰妄緣故問發心見相之由為止散入寂之本若觀先詰妄緣似知破識而末言為止散入寂之本則亦知之未的也良以如來破識非徒止其緣境散心入於寂定而已其曰縱滅一切見聞覺知內守幽閒猶為法塵分別影事又曰諸修學人現前雖成九次第定不得漏盡成阿羅漢皆由執此妄想誤為真實是豈但以止散入寂為是乎當知佛意要明此識不論散亂寂定全不是心但是塵影無自體性欲修奢摩等最初要須捨盡此心而不用然佛所以必取發心出家之識而破之者別有深故自古未明良以此識勝善劣惡之用最多破劣惡則必留勝善破勝善豈復存於劣惡哉且此識勝善之用略有五種一者緣佛色相心一者緣佛聲教心三者聞法領悟心四者止散入寂心五者界外取證心此等勝善識心佛於斯經總皆破盡故此首破出家所發之心者即破第一緣佛色相心也下文云如汝今者承聽我法此則因聲而有分別即破第二緣佛聲教心也又下文阿難不捨悟佛現說法音佛告此法亦緣乃至緣聲之心離聲無性即破第三聞法領悟心也又下文云縱滅一切見聞乃至猶為分別影事即破第四止散入寂心也又下文云現前雖成九次第定乃至皆由執此誤為真實即破第五界外取證心也此五尚皆破除而其他劣惡者安有遺餘或然此更要知佛破意不是為此五用有過差處而破之也蓋五用仍是勝善功德有何過差但人認此發用之識為真實本心方為大過以無邊生死皆為錯認此識為心故也觀佛呵云咄阿難此非汝心此是前塵虗妄相想乃至認賊為子故受輪轉方是如來破之本意但所以必帶五用而破之者有二意一者離用則識無相從何施破二者五用是此識勝善功能恐人重此功能遂執悋此識不能捨盡故但從此五施破此而不悋則妄識捨盡無餘矣以是意甚深難識故舊註不達見佛首從見相發心破之便向發心處求覓過差而云見相實有等豈知破意不在執相為有但在執識為心耳是則佛本決定分明全分破除此心無毫髮姑息遲留之意其柰眾生無始劫來執為己心除此更不知其別有真心極為難捨雖以如來極力破奪猶不能生決定信成決定捨而往復狐疑執悋猶豫者紛紛皆是其他不足為怪至於楞嚴解主以著述之才積禪講之習發心會解何止三二十年到此見佛破得此心太甚反乃救之曰原夫妄無自性全體即真所謂破無所破無明即明乃至世尊前云眾生不知真心用諸妄想今云執此妄想誤為真實然則妄想果非真心耶當知法無得失迷悟在人若利根惑薄者了達妄想之體直下便是真心等此一段言語縱有理據不應此處發之置之此處壞盡楞嚴旨趣以眾生到此正當執悋狐疑方搖未穩之際那堪復聞雪上加霜之語引人多少猶豫長人多少迷情蓋如來從經初費了許多氣力七番破其無處覿面呵為非心極力表其無體今乃公坑出其全體又言便是真心豈不令人依舊成決是真心之見乎且阿難往復強騰疑辯到此方纔得箇默然自失將有撒手放捨消息末世伶利眾生聞經到此亦同此意若聞此語寧不依然把住不肯撒手將謂如來破斥亦是假意此識元來即是真心凡遇順經言破斥者便以此言遮救豈但不成決定捨將復還成決定執矣寧不壞盡如來之本意乎客曰識心若果全妄畢竟當破後經四科七大何又許其同是如來藏心答天如疑根正在於此良由方便平等二門未通達也方便者決擇意也平等者普融意也經初破識全妄而戒其勿用者方便門抉擇意也經後許識亦真而同稱藏性者平等門普融意也順佛旨而不失其序則二門可互相資違佛旨而矯拂雜亂則二門乃互相背客曰何謂順旨則互相資答識雖藏心而為生死根本不破除則錯亂修習蒸沙作飯故破除所以為入圓方便又識雖妄本豈外唯心所現不融入則心外有法聖性不通故融入所以令方便不泥斯則前後皆但順奉佛言各成妙旨豈不互相資乎客曰何謂違旨則互相背答如佛正當決擇之時則取後平實之意以抗之曰同為藏心豈果是妄何必破除則妄本堅而真修永塞矣准此則至後如來融入之時亦可取前方便之意以抗之曰生死根本豈真藏心何必普收則方便泥而圓旨永隔矣是則撥佛前後妙旨全成自語相違豈不互相背乎當知平等普融收法須盡方便決擇取捨須嚴後之普收初不礙於前之破斥豈可因後疑前而不決定依佛破斥乎若必執後藏心而疑前非決定破則水火二大亦是藏心崇水事火者即應非決定外道豈可修楞嚴者亦許其崇水事火耶是則水火雖藏心而崇之事之決墮於邪見而不成正覺固決定當破斥也亦猶六識雖藏心而用之修之決滯於生死而不成菩提亦決定當破斥也子何惑乎客曰識雖藏心修終不用後經身子等何復依之成六種圓通乎答此亦諸家蓄疑之一端也既經文殊揀除何勞更問如其不了可尋後偈文及彼處疏文研之無不明矣二者顯見不決定蓋破識之後佛本顯見為心而舊註皆云前文已破妄心此下乃破妄見以顯為破此非小迷故須辯之夫如來既破阿難素所堅執之識以為非心則阿難却問如來何者是寂常妙明之心而如來此時要須有箇是心的還他方纔了事不然即當索之無休何緣又起破斥且他將舊執一時放下單單索要那箇是心却破他箇甚麼若說此時該破則是連問答說話的次序也不知道安能發揮佛意且佛本於眼根中指與他一段見性表其有眼無眼或明或暗其體恒存即靈光獨耀逈脫根塵不同前心離塵便無自體末後又申其正義而判定云是心非眼以眾生平日只知此見是眼不知是心所謂迷己為物如來斬新指出向他道你問何者是心此之見性即是汝心你如何一向只作眼解不解是心你從今當知此見是心非是眼也夫前破彼識非心今顯此見是心一非一是敵體相翻一破一顯詞旨灼異極為分明順暢亦是問答相應自然語勢何故千有餘年諸師齊言此處是破妄見且凡有破因有執也如前識心因人知之分明執之堅固故方種種破斥奪其固執今此見性阿難示同聲聞平日竝不知此見是心誰生執著却破他箇甚麼甚無謂也此方於根中指出見體合下共有十大段文極顯見性不動不滅不還等如來真慈只要當機者捨前所執妄識取此新顯見性而執持之認為真實本心蓋惟恐其不肯執持豈有破意哉請觀下文阿難尚猶重重不肯認取一則曰云何得知是我真性一則曰見必我真我今身心復是何物一則曰與先梵志冥諦真我有何差別此等疑情翻復不定如來方與重重決疑重重顯妙責其不領勸其執認之不暇尚敢少加破斥哉如是展轉十番俱是顯示見性之意而諸註總皆迷為破見而云下文七徵八辨重重逐破者此也又且詳辯先破妄心後破妄見之故出其三義其一謂心是妄元復是人執之本須先破之而不知人執之本在於第七今破前六與彼何干其二謂心屬王數通乎三性故在前破見惟眼根但屬無記故在後破此已似將如來所顯見精迷指浮塵色法故反劣於六識心王不知如來所顯根中妙性乃陀那細識即如來藏心豈反劣於六識哉近見書冊本中復將眼根誤成眼識若是識字過犯無邊蒙昧者尚不知其為誤亦可嘆哉其三謂今破妄見則引盲人矚暗等以彰見性不滅乃至舉手飛光皆顯性無搖動此意似謂妄見與見性為二法於妄見則破之於見性則彰其不滅顯其不動細察如來於盲人矚暗章中只是於眼根中指出見性而明其於眼根及明暗了不相干全體是心而已更無二法將指那一句是說妄見為當破那一句是說見性別為勝法而當彰顯乎既謂矚暗飛光皆是顯見則盡其文而皆顯意矣更取何處為破見乎且不動既是顯見則不滅不還等八大科文皆是顯見而補註憑何又將八還辨見類同七徵逐破之文乎將恐其意即以顯為破耶然破如彈劾奸邪顯如舉薦賢德世間豈有舉薦即是彈劾者乎通上三義觀之則其法相不明破顯混濫謬亂顯然有何難見似此註文前後極多不勝其辯見解如此安望其發明楞嚴之奧旨乎然則斯經受屈久矣故不得不略明也詳其致惑之由其略有四一者破識之初因雙徵心目遂謂佛意竝破心目上既破心次當破目而謂目即見故因佛舉拳類見遂言從此皆是破見也二者佛引盲人矚暗發明見不是眼恰似破目遂謂此是破見無疑三者佛將顯見無還而先抑揚之云此見雖非妙精明心如第二月非是月影夫初聞雖非妙心便即不敢認見為心又聞如第二月遂疑此見全妄將謂此見之外別有真心借見顯之而已因是遂有心見互顯正顯在心之說四者十番顯見之後佛釋見見非見之迷悶首言輪迴世間皆由二種妄見遂謂此見全體皆妄且竝將前十番顯見是心之文皆總判為破妄見而言同於七徵種種逐破矣諸師因此四惑橫於胸中遂皆齊於舉拳類見章中總皆標為破斥妄見標雖標定及至逐文詳釋又見分明皆是顯見妙處却又順佛釋為顯見遂令學者觀其標處全是破見看其釋處却是顯見而標釋全不相應破顯兩無決定又據註則心見宛有二法考文則心見本不曾分此四惑乃千載不決之疑根今試與拔之其一破識而乃心目雙徵者非欲心目竝破也欲得其所執心處而破之恐因心不可見而生迯遯故帶目之可見有定在者以例顯之令決說出心之定在如目在面而已觀佛結問云惟心與目今何所在阿難結答云浮根四塵祗在我面如是識心實居身內由是如來既得心所在處遂破心不在內等更不提目可見但是帶言例顯本無竝破之意如必執言目當與心相次而破則前言識在身內即破不在身內前言目在面上亦應破其不在面上然文中固無此言而亦豈有此理乎是則本此而為破見之由者決是差誤無疑也其二佛引盲人矚暗但顯眼無而見不曾無足知見不是眼既不是眼便乃是心所以酧當機索要妙明心也非以破眼為正意譬如珠在囊中光透於外愚者謂囊之光棄而不取智者為其倒囊顯珠令取勿棄是其正意惟在顯珠豈在破囊無光哉囊如眼光如見而珠如心思之可見是則但顯見性非為破眼而因之以成破見之惑者是又一差誤矣其三佛言此見雖非妙精明心如第二月非是月影此之語意元非貶詞乃小抑大揚勸人認取勿棄之意也其言雖非妙精明心小抑之也蓋上文既已呼為見精明元則是精明二字已自現具良以體極微細故曰精用常湛靈故曰明但以體中尚帶二種顛倒見妄不曾破除精明未妙故言雖非妙精明也是惟表其已具精明而但欠一妙略以抑之非深貶之也然小抑之意明其認取之後尚當除妄以使精明進極於妙而已非舍此而別有妙精明也下言如第二月非是月影者隨即大揚之也蓋第二月非離月體但惟被揑似影而已非如第三水月真是虗影而非實體矣此更仍表大勝前來識心以彼正同水月虗而非實爾是則喻中月無異體揑之則為第二月放之則為第一月非有一體一影之差法中心無異體帶妄則為見精明元除妄則為妙精明心亦無一實一虗之別蓋極令認取而勿疑也如此領會方得如來真實語意以今方欲阿難等認取此見為心故也諸師不達此意纔見雖非字面便與種種明其是妄似乎離此更別有真所以舊註迷真為妄迷顯為破且又言因見顯心雖心見互顯而正顯在心宛然迷一體為二體矣其四佛明二種見妄者以根中見性即黎耶體而本經呼為陀那細識楞伽言即如來藏心以其真妄和合一切淺智或迷為非真或迷為純真故佛常不開演今經以無遮大悲引權入實始而憫眾生迷此性之非真也乃於破識之後極力十番顯其為真令其認取領荷勿孤負也終而恐眾生迷此性為純真也却於顯真之後略出二妄示其非真令其覺悟破除勿眠伏也是則先顯其真既不令其迷真為妄後除其妄又不令其執妄為真斯可真與非真二迷雙脫而後之破除初不礙於前之顯示夫何舊註因其後之略破遂以昧其前之極顯而總以判為破妄見是畢竟墮於非真之迷而辜負己靈甚矣豈非又一大錯哉是則諸師千載於一見性或標釋兩不相同或心見析為二體遂令破顯無定而真妄難憑者皆由此四惑以為根柢今既各明其故而疑根已拔則顯見為心之旨庶可以決定無疑哉總上方知破識破盡決定是妄顯根顯極決定是真非有猶豫兩持不決之意然猶未知此與奢摩他等有何干涉乎要須說出此意方是破識顯根之故然前於問答迷中奢摩他內已略出之今復重申正以妙奢摩等惟明自性本有定體而識無本定爭柰當機堅執故須破盡令捨之也根具本定爭奈當機全迷故須極顯令取之也仍更當知用識用根乃權實之所由分蓋迷識為心更別無心即是權教覺識非心別有真心即是實教問權實之分有多因緣豈獨係於用識用根之別哉答權實之分縱有多緣而心為其總心是則無所不是心非則無所不非且眾生從無始來將全法界性海迷成識海又轉識海而生七浪即前七轉識也於前七中動身發語惟是第六故凡夫小乘豈但迷性海識海而兩皆不知亦且於前七轉識中上不知有第七下不知辨前五惟計第六為自心相故佛出世間豈不直欲人人皆悟前七非真而直窮識海以還復性海耶其柰眾生從迷積迷以歷塵劫則不可頓覺之也故華嚴會上直談緣起即是性起正明識海即是性海而二乘在座如盲如聾況凡夫乎佛亦無可柰何直得俯就機宜從實施權且不改其錯認之心將錯就錯於人天小乘教中但立六識為心故小乘七十五法中心法惟一也然此心之用略分有五一惡二善三不動四小果五大因故佛於不能頓悟性海之人但就此心差別之用漸次轉之從劣向勝一者說人乘及欲界天乘且轉此心之惡令遷於善俾其離三塗苦得人天樂二者說上二界天乘且轉此心之散動令歸不動俾其離下界劣福報得上界增上福報三者說聲聞緣覺乘且轉此心之著有令悟入空理俾其離三有障證界外小果四者立始教大乘且轉此心愛念小乘令回向大俾其捨小果成大因以權教大乘定慧之體仍用六識所謂以生滅心為本修因雖轉賴耶終無實果也故自阿含以後般若以前皆權用此識為心乃總屬於權而一切非實所謂心非而無所不非也直至法華會上方總廢前權乘而立一實教然當改革之初頗費斷疑生信之力不暇細論權實二心但且除其三乘之名廢其權許之果而已斯經在法華之後大疑已銷正信已定却當改其權乘心行而授以圓實心要法華云今所應作惟佛智慧是也故今經最初破識心者改權乘心行也顯見性者授圓實心要也舊註於破識處公然救起則永固權乘心行於顯見處迷為破見則塞絕圓實心宗破顯雙迷而斯經妙旨全成靄昧然則眾生決定正信何由而成分明道眼何自而開耶此新疏不得已而作也此意更合後畢竟廢立科觀之而義無不盡矣然又當知所顯根性即是識海本不異於性海而但帶無明如二月被揑眾生捨此無由見性故此顯示根性非但只為經初要義而全經始終皆以此為要義故開示時從眼根而開修入時從耳根而入諸佛異口同說生死輪轉解脫涅槃同是六根更非他物偈中結云陀那微細識習氣成瀑流真非真恐迷我常不開演夫陀那即業識別名然則根中妙性豈麤淺之法哉第以微細之真體和合瀑流之妄習若欲開演既須顯其真又須破其非真而淺智聞之必成狐疑錯亂難悟易迷故寧常不開演也今經為引權入實不得已而一開演之其初十番極顯其真其次二見略破其非真果然諸註不達全迷顯真而總標破妄破顯既以無定真妄竟以難憑於見於心一異莫決竟皆墮於非真之迷而卒不敢領見為心矣聖言懸記豈有毫髮之虗設哉三者結略指廣夫經初略以舉上二迷實經旨中最大關要尚皆未明其餘節節巨細等殊豈能盡舉疏中於是非易了者默密改正不復對辯具眼者涇渭自分亦有是非淆亂不容隱默者辯正現於疏中略其大節如垂手倒正之訛五重結歸之謬進退合明之錯不歷僧祇之疑忽生相續之無分三細六麤之倒亂四義三藏之無歸二決定義未達不出前二根本別索結元豈知即是不領六根知見二字非惟不直釋為六根而註文空有真妄之偏墮偈文則直妄空有之俱非豈有長行偈頌之照應哉六解一亡與舒結倫次非惟分答不明而佛言有次註言無次不達竪論非橫豈有經文註文之一旨哉二十四聖謬分大小二十四門橫執淺深耳根聞性非惟不知即前三藏之心而三空六結悉未明也三決定義但了戒詳而不知道場定慧即耳根圓通也眾生顛倒不知由見思而結業為因也世界顛倒不知自遠塵而迫近成果也亦是由離知而合著成苦也三種漸次不知但加戒而仍是圓通住前十心妄撥孤山註而謬非初住仍未了十心即五根五力十住全生入佛家十行不出六度十向豈越三處四加乃心佛之即非十地但理性之顯發凡此悉不與舊解雷同皆其大段總意其餘科斷之差殊字句之別異殆不可盡述是在智者之疎觀而必無遺照矣當知重疏之作端為惜佛旨之蓁蕪愍後學之蔽塞深有不忍祕吝所知而竟負佛恩之加被故不避譏誚而重製斯疏焉非敢沽名長慢強倒是非以自貽生死之長患也所冀知音冥契心一見同者願相印證而高智異見不盡投合者幸教示之勿吝爾申己解由已竟二法古提綱者法古人之程式提經中之大綱也詳夫如來五時設教藏乘所收有無量差別法門無量差別因緣乃至理趣淺深機宜利鈍等種種不同今釋斯經若不解前懸判分明則如上諸事鮮不迷惑是故解家於經前懸敘乃一定法則也然準古諸師多於解前作十門分別序次名目亦多相似而不無小異故茲列數雖遵於古而序目實不盡同亦各隨所見而已一確定說時二藏乘分攝三因緣所為四義理分劑五教所被機六能詮教體七宗趣通別八科判援引九通釋名題十別解文義今初確定說時者良由諸師因一二別典所傳事迹稍不投合遂於斯經異說紛然判時不定既說時未定則權實難分而因緣所起及藏教收攝等悉不可定故今首以定說時也說時既定則權實攸分而諸門判屬皆無猶豫矣夫凡時懸曠古地隔遐方者其事迹多不可以考定如此方上古今世殊訛傳交互不可考據之事何限況西天佛世時與地皆懸隔之甚而欲於參差不備之梵文以求考據之真不亦難哉故事迹有不合者擲之不必泥也至於聖經本文密籍威靈外資賢哲譯翻詳備文義皎然若但據此以甄分權實量定說時無不可以意得者奚可以一匿王父子為難哉今據經中明文了義阿難以二乘求成佛道滿慈以羅漢歇即菩提十二類生與六十聖位敵體相翻初無五性分半之拘限而顧有疑其在法華前以至下淪於方等般若者則是法華以前小乘已無化城之滯異生皆許成佛及至說法華時復有何權可開何實可顯哉況顯言耶輸陀羅已蒙授記若非法華在前與之授記復是何時與之授記耶又出現惟為知見惟佛究盡實相法華已前聲聞未蒙與說也斯經實相三出知見四稱若在法華之前則是前此已向聲聞屢說法華何謂聞所未聞乎凡此文義炳著是可見其在法華之後無疑矣而智圓諸師判在法華涅槃之間當必見同於此安可以區區事迹而妄非之哉或曰法華但為會融一類執權迷實之二乘而已故全是二乘當機非謂法華以前絕無大乘實義之教如淨名勝鬘般若等經皆談佛性真常之理俱在法華之前安知楞嚴不是此類故諸師判為方等般若亦非無見而然也子何必非之而定判為法華之後乎答法華以前雖不無實教而實未面許聲聞修大作佛故聲聞非但未敢公請修佛而如來亦不與之顯說真要以是菩薩屢騰敗種之譏二乘每抱絕分之痛是則方等般若實雖具而權未開也直至法華方許進修普成佛道而身子等敘昔未聞之意在文可考今斯經同法華全以聲聞當機故慶喜滿慈所請者皆圓實之妙門而如來菩薩所演者悉成佛之真要方等般若中安有如是問答若強判於法華之前則是先已開許聲聞捨擲小乘修習佛道至法華而身子何言但教菩薩不為我等說斯真要失於如來無量知見甚自感傷又自從事佛來未聞如是說是皆何所為而云然乎縱令巧言曲救終難銷會耶輸授記之時然則斯經決定法華之後始於上之諸義為不乖背學者幸勿多疑但依智圓諸師所判為正問匿王父子雖不足泥但經初匿王現在而經尾琉璃已墮斯經一期何太時長宜其眾疑不決幸勿擲之一為剖析以拔疑根焉答古德已言經非一會前後異時結集收之類為一聚自足斷疑何勞多問況法華涅槃中間八年之久何事不變且匿王垂老豈當佛之早年須在法華之後更後七八年間琉璃逆事何不可畢但判經兩會不曾的指其處今疑當在結經之後阿難請談七趣如來自說五魔之處全似後會別說以前大定三名連答經之五號結終文勢連環豈可中斷至於七趣五魔自是經外別義若齊此另為一會文固判然可見而匿王父子之疑亦渙然冰釋矣二藏乘分攝者良以說時既在法華之後則醍醐上味越彼二酥而藏教所歸有何難辯然古德謂三藏確論所詮從正而不從兼取多分而不取少分則經詮定學律詮戒學論詮慧學而斯經多談大定正詮定學雖有少分起行之戒論議之慧是但所兼而非正也故知斯經三藏之中修多羅攝至於二藏定屬菩薩而不屬聲聞以當機所請純是菩薩行也又雖兼說呪心名標灌頂而啟悟修證顯文較密過數十倍亦但以密助顯而已非祕藏所收也若此攝彼皆可傍兼兼餘可知而聲聞亦兼者以不廢聲聞戒及小異名故乘攝則正惟同教一乘而兼屬別教一乘若此攝彼則三五俱該如四重三漸乃至七趣因果俱彰尚不遺人天何況餘乘十二分中長水謂契經方廣二分所攝攝彼如前此中藏攝擬於起信而乘分法於𤀹師三因緣所為者現見世間凡舉一事必有所為因緣況佛大教豈無所為而然耶古德謂須彌山王非小因緣之所能動亦非少因緣之所能動佛所說經亦復如是準清涼解華嚴因緣各有十科詳其所開之緣大同六種成就等意斯則入經自解今不更開長水所著本經因緣有總有別別中多遵賢首斯解總雖同彼而別則多殊今夫總者謂佛諸教總為酬因酬請顯理度生所顯之理即佛知見眾生等有迷不自知故淪生死佛於因中悟此發願成佛普示故今五時諸教雖言有權實顯有遲速而意中所主惟為此一大事因緣故此為諸教總因緣也別亦有十一者畢竟廢立故二者的指知見故三者發揮實相故四者改無常見故五者引入佛慧故六者示真實定故七者直指人心故八者雙示二門故九者極勸實證故十者嚴護邪思故應知此之十門逈不同於長水義海中舊所立因緣今初畢竟廢立者以法華雖曰廢權亦但廢其三乘之名及所許之果相明其無三無果而已立實者亦但明其惟有一乘而普許修佛成佛無復分半之拘限其曰汝等皆是菩薩亦惟授以大乘名字而已是則三乘之心行未改則非畢竟廢權一乘之心要未授則非畢竟立實也正由四十年來已定之說一旦更張人心慌越疑網重重且與破裂稍得信領便且極力苦勸流通以定其志故彼經不暇細除心行及別授心要也直至斯經方與畢竟終其廢立之實焉良以權實雖有多種差別而所用之心以為本修因者乃其差別之要也故斯經初中後重重與之判決權實二種行人所用之心大有不同令其決定捨權取實如最初判云一切眾生生死相續皆由不知常住真心用諸妄想是則一切眾生竝該權小生死相續變易同倫故知妄想者權人所用之心也常住真心者實人所用之心也此猶隱略須待釋明至後剖判二種根本乃大分明不勞補釋文云一切眾生業種自然諸修行人不成無上菩提乃至別成權小魔外皆由不知二種根本錯亂修習猶如煑沙作飯塵劫無成一者生死根本即汝今用攀緣心為自性者二者菩提涅槃元清淨體則汝今識精元明能生諸緣緣所遺者向下所破識心令其捨之者斥妄根本也指與根性令其用之者授真根本也惜舊註於真根本全不達其即下所指與之見精以舊註齊指見處皆誤判為破妄見故也詳究如來剖判語意則知一切權人之所以為權者由其錯用識心為本修因也若不斥之令捨則令法華徒廢權之名字而心行不改依舊蒸沙作飯豈畢竟廢之耶實人之所以為實者由其能用根性為本修因也若不授之令用則令法華徒立實之名字而常心不用依舊終無實果豈畢竟立之耶至三摩提中二決定義依舊將前二本應擇去者決定去之應取用者決定用之而已但第一決定即兼去妄用真二義其所辯生滅心不可以為本修因者即前攀緣識心況下明言先擇生死根本即去妄本也而於前名字絲毫未改舊註不能略照佛言輙取近文釋為五濁業用又其令依不生滅圓湛之性即用真本也而舊註又別釋為三止觀全與前文無干遂令悟修不成一貫而後學永迷也至於第二決定但令決用真本而加詳爾且下文引諸佛證明識性虗妄猶若空華生死涅槃皆惟根性及至選圓通時畢竟惟用聞根而已是皆所以改權人之心行而授圓實之真本也當知如來正為畢竟廢權畢竟立實故說斯經二的指知見者總因緣中雖言諸教皆具而權宗但是隱覆曲談非顯了說法華以後方是顯談其奈開顯之初且但題破名字未暇的實詳指不暇之故前文已說因此解家各隨己意釋之如以三智五眼為知見則偏就果德為言而不詳佛開示悟入語意雙含性具修成兩義古德釋此多惟取義而不曲意尋文苟皆依義而不依文將使聖言但具義無礙而不具辭無礙也烏乎可哉今據經本文云欲令眾生開佛知見使得清淨故欲示眾生佛之知見故欲令眾生悟佛知見故欲令眾生入佛知見道故字義多少句句不同豈可一槩取義自在而更不顧義之所安乎今有私解來哲審之知見二字楞嚴中佛自指明今且伸明諸句不齊之故啟閉曰開佛知見三字應指眾生性具本有知見即佛知見持業釋也但為迷倒封閉故開令顯現復加使得清淨四字足顯乃是在迷之體不開未即清淨揀異修成不更使淨也然一開即永離迷倒之封閉是謂清淨矣出告曰示謂出己所有以昭告於人也佛之知見即釋尊與諸佛修證已成果德上之知見依主釋也蓋眾生惟有性具知見而未逮修成知見若但開其性具而不示修成則終無究竟故就己修證以示諸佛之知見焉自惺曰悟承上開顯本有而自悟性具之知見也親到曰入知見道者修證果上知見之門路也例如道諦承上告示修成而親到修證境界矣前二在教後二在機一三屬性具而二四屬修成也至於知見惟楞嚴方以的指六根中性是也如五卷諸佛同聲證云生死涅槃同汝六根更非他物及釋尊自解云知見立知即無明本知見無見斯即涅槃云何是中更容他物是顯然以根性為知見也但近示初修雖似但惟發端於根性及至漸次開顯到於究竟即是如來藏性非佛知見而何哉若以開示悟入而考斯經從初發明見性至七大徧周令其知真本有即開啟性具之知見也自問云何忽生答至三種相續令其達妄本空即使得清淨也自辯五大相陵答至三如來藏即告示如來自所修成之知見中間文云我以不滅不生合如來藏乃至於中一為無量等四交徹意即究竟知見之大用又云如來藏心非一切即一切乃至離即離非三圓融意即究竟知見之全體此文明是如來出己果德以勵眾生由性具而尅此成功恰合法華欲示眾生佛之知見觀其結云如何三有眾生出世二乘以所知心測度如來無上菩提用世語言入佛知見可驗上文皆是說佛知見也若論語佛知見單約於機則後別無文不離開示之下前云各各自知心徧十方等後云疑惑銷除心悟實相等皆是也至於入佛知見雖亦約機若連欲令二字讀之兼是教意斯經三摩提之契入禪那之修證皆是欲令眾生入佛知見也蓋悟人守悟不依方便從修證門則終不得入故也此是約教論入若約機入則圓通偈終聽眾進證等三位結經名後當機增位於二果是也是則如來知見極於三藏圓融四用交徹究其性具實體秪在眾生六根門頭誠亦難信無怪諸師於指見是心處皆誤釋為破妄見也佛為特指如來知見即是眾生根性故說斯經三發揮實相者法華云惟佛與佛乃能究盡諸法實相而亦未及顯彰何為實相雖歷舉相性體力作因緣果報本末究竟等此亦但是盡舉諸法差別之相渾以如是標之其旨隱而未彰天台變文釋為三諦圓融自是解家之意非佛自所發明今經三番明標實相顯發無遺一者於二種顛倒見妄之先首責聲聞不達實相足知向下剖開妄見所出真見乃至陰等四科所顯如來藏性是即究諸法實相也二者七大之前許令當來修大乘者通達實相足知向下所明七大藏性清淨本然周徧法界是即究諸法實相也三者於四卷中正答滿慈兼示阿難之後乃結聽眾心悟實相足知上所談者生續本空性相無礙即究諸法實相矣問此與知見何別又據所引之文既皆取其所顯之性何不即云實性而必曰實相乎答知見實相約心約法為門各殊當知尅就心性名如來知見約此性體散為萬物而仍不變其本妙理體亦無隱覆如金雖作器不變不隱故欲見性者當體即見歷然性相雙顯而曰實相表不壞相而見性也如欲觀器金者不勞銷器當體即見而稱寶器表不壞器而見金也是則即相而惟見其有即凡所有相皆是虗妄也若即相而直以見性即凡所有相皆是實相也是則約此性未起為相應曰實性約此性已起為相而不變不隱則曰實相至後諸聖七趣五魔雖不明標實相類上而知不出果報本末究竟等實相也佛為彰此實相故說此經四改無常見者法華以前佛多示無常者蓋緣凡夫於常住真心中被無明所覆盡皆迷成生滅無常之法身有生死心有去來界有成壞於中受苦無量又為諸苦逼極就此無常法中強覓常住之處各隨所見妄立涅槃如五現之類間有執斷滅者亦以滅為常住如七滅之類遭其誤賺升墜無端猶如轉輪佛為愍此顛倒欲令捨離故說盡三界內悉是無常無樂無我不淨教出三界外別有涅槃乃一期應病之藥作離苦之勝方便而已由是小根者競起厭離爭出三界是雖暫愈斷常之病不免轉藥成病永計三界實有生滅非虗避如火坑怖如牢獄而萬法惟心湛然常住之體轉成隱沒沉晦矣是又一顛倒也故法華初轉前心略為標云是法住法位世間相常住近解兩句雷同皆言萬法常住天台舊解是法指一心法正合性空二宗法異真俗也住法位者凝然住於正位理中所謂本際不動斯則心無去來輪轉之事也世間相即情器二世間相也常住者本無生死及成壞也此雖略顯身心世界常住之旨而言未廣陳故義非明決及至斯經名題首楞嚴已見總詮一切事究竟堅固之理文中首指見性為心而備顯不動不滅不失無還等義則心住法位之旨已明到後廣彰五陰六入十二處十八界七大皆即常住妙明不動周圓妙真如性則世相常住之意亦顯誠所謂徹法底源不動不壞及至指示修門決定義中乃明不離眾生見聞覺知遙契如來常樂我淨究竟真實大涅槃果是惟斯經始有以全彰真常真樂真我真淨而盡祛乎無常無樂無我不淨之舊見前之藥病雙除而本來不動之真際方以歸元而顯現焉經雖顯了分明而實此意甚深難解若當說聽之時說者隨文而說聽者隨文而聽尊佛語故無不欽承實則非己智分最難得乎真實領解今試離經間中語於人曰人人有箇真心常住不滅其餘諸法都是無常其人雖習過楞嚴亦於斯言不生違拒信順而已殊不知方是法相宗真妄各體之旨正與楞嚴違反胡為聽之而不覺耶又若於間中語之曰現前有情肉身無情房舍器皿華柳風雲乃至電光石火一切幻夢暫現之物皆即當體真常不壞不滅斯則豈惟教外人不信不解雖其習過楞嚴者亦多迷惑不解遲疑不信矣正以此之深旨本難解領小乘法相聖人尚乃頭迷麤心學人安能極領而徹解之乎今略重與曉示須以譬喻而得開悟然所謂真心者非世人迷執身中方寸之心亦非千里萬里東想西想之心亦非禪定強制之心乃自性本具湛然不動體徧十方量等虗空明越日月即經初所開顯之見性此方是真實常住之心此心譬如一箇極大鏡子山河大地及肉身房舍等乃至流轉成壞皆如鏡中之影一往觀之似乎鏡無動搖生滅影有動搖生滅此即同於法相真妄各體之見祖師所謂半生滅半不生滅是也若能就喻詳觀影無自體體即是鏡鏡不動搖生滅影豈動搖生滅乎若一靜一動須有二體今既本無二體而諸影復將何體以成動搖生滅乎以是義故而知萬法與真心本無二體何得真心常住而萬法不常住乎此法相所以為迷倒不了而法華世相常住斯經一切堅固為真實了義也佛為明此了義而改萬法無常之見故說此經五引入佛慧者華嚴全談佛慧而五濁正熾未堪普授故法華云我所得智慧微妙最第一眾生諸根鈍著樂痴所盲如斯之等類云何而可度緣是二時以來一向施權故法華又云尋念過去佛所行方便力我今所得道亦應說三乘直至本經會上方以顯實而令歸佛慧故又云我即作是念如來所以出為說佛慧故今正是其時又云今所應作惟佛智慧又云既知是息已引入於佛慧雖重言疊舉但是名字實無列義出體明文天台雖指在華嚴亦但以三一圓融之義釋之固無不是而其言總略未盡重玄豈與華嚴相稱適哉今當了簡而後明斯經文義稱適了簡有二一對他二約自對他者普對五時諸教諸經皆佛發明莫非佛慧此意太寬非今確指良以佛教有隨自意有隨他意諸餘權宗皆隨他意偏真偏俗執邊執中但可謂聲聞慧乃至菩薩慧而已非佛慧也約自者不對聲聞等慧正約佛慧乃有名字義相之分而義相中更有總略重玄之別今法華經但有名字而義相全未顯現縱天台疏釋但約總略未盡重玄總略者即三一圓融之種智重玄者即六相十玄之妙門若取諦心四法界觀理則有三十玄門方以盡法界無障礙智而佛慧始以罄其全體大用所謂微妙第一盡思莫測豈虗語哉今既云引入佛慧縱不全彰體相亦應稍列義門秪以法華不暇之故明有待於斯經是以斯經首請三一圓融之大定而佛於次第藏性中已具總略佛慧而中間所謂於一毛端含受十方國土即露重玄之端及至圓彰藏性時備明一為無量無量為一小中現大大中現小乃至於一毛端現寶王剎坐微塵裏轉大法輪而復極於三祕密藏及後談聖位時十行位內復言十方虗空滿足微塵一一塵中現十方界現塵現界不相留礙凡此諸文皆十玄中極智而不具足十玄全義者引入而已仍知此固擇取重玄彰勝況劣爾若竝全收總略則通部皆是佛慧以斯經純用第一義諦故也而所以偏擇重玄者以理事無礙法界尚通一乘同教而事事無礙法界獨屬一乘別教華嚴所以逈別於一乘同教者正惟在於事事無礙法界以其具足一切玄門而斯經毛端現剎塵中轉輪等文正事事無礙之旨而為華嚴之極智法華雖標佛慧了無此文尚無總略之相豈有重玄之門此所以必待斯經而後詳究佛慧之義相也是則原其始也本從佛慧海中流出差別之慧以成一切權宗要其終也還會諸流悉入佛慧海中以抵一真實際所謂無不從此法界流無不還歸此法界然法華與斯經雖皆攝末歸本之真詮而法華但以開其端而斯經方以竟其說矣我故嘗敘斯經為法華堂奧華嚴關楗誠有見於是爾問此與佛知見何別答此有多種差別知見屬如理此屬如智三大之中知見屬體此屬相用三德之中知見屬法身此屬般若解脫三因佛性知見屬正因此屬緣了有如是等種種差別問約知見實相佛慧三種名義雖別約子所取證之經則皆無有別文夫能證經文既不別異而所證之法安有多種乎答義相為門不同理體安有多種故不離一法而說多義門大教以萬法一心為宗分之則有萬法會之則惟一心故云如來能於一箇說百千萬箇能於百千萬箇說唯一箇以是義故一字法門海墨書而不盡豈以全部經文重證三法為多乎請勿惑也佛為普引眾生入佛慧故故說斯經通上五義前四全為法華後一乃為華嚴夫諸佛出世本只為說華嚴而四十年後乃稱法華為一大事者以法華於施權之後復攝諸教歸華嚴爾今斯經前五因緣圓法華不了之公案啟華嚴無上之要關所謂莫大之因緣豈小小哉六示真實定者有二一為教諸權乘捨不真實定而修真實大定夫外道凡夫小乘及權教菩薩皆各有定而止於凡外權小悉無究竟者緣其所依定體皆非真實心也即斯經首所破者如佛云縱滅一切見聞覺知內守幽間猶為法塵分別影事斯則一切初心樂修禪而未決擇者無有出此境界者也故諸凡夫天雖奮精研所修八定寧能越此又云分別都無非色非空拘舍離等昧為冥諦則知一切外道所修邪定同用此心又云世間一切諸修學人現前雖成九次第定不得漏盡成阿羅漢皆由執此生死妄想誤為真實由是而知諸小乘人亦同此心安有別定但加深至爾要之通上凡外小乘皆但知此六識為心離此別無故約下界但知此心惡則三塗善則人天約上二界但知此心散則下淪定則上升諸小乘人亦但知此心伏為界內斷為界外而伏斷望煩惱種現為言如阿難云若此發明不是心者我乃無心同諸土木兼此大眾無不疑惑大眾應即凡外權小相宗果中雖八識齊轉而因中修定全取第六是由所依之心既皆生滅而非真實故其所修之定有入住出入之則有出之即無境靜則順境動則違在定縱經多劫必以靜而礙動出定略涉須更必以動而礙靜凡外定銷必成墮落小雖不墮了無進益權雖略進亦不遠到推其病本皆由最初但順所迷生滅之心強制令定而曾不悟本有不動之心故也是故斯經阿難首請如來大定而佛即先以徵破識心以不捨此生滅迷心終不能修如來真實大定然於徵破之初即許之曰有三摩提名大佛頂首楞嚴王等此即真實大定之名向下即徵破識心可見欲修此真實大定須先捨此生滅不實之心而別取真實心也其別取真實之心即下破識之後指與根中見聞等性然此性屈指飛光分明顯出本來不動之體豈假強制而後定哉觀河無老分明驗出不滅之常豈有墮落斷滅之憂哉八還對辯分明見得無還之妙豈有出定喪失之理哉人能灼見此本具之性守之即為真實大定何假多術故四卷末擊鐘驗聞之後乃曰若棄生滅守於真常常光現前則汝根塵識心應念銷落乃至云何不成無上知覺五卷諸佛證明六根之後偈中即許用根而修者為如幻三摩提彈指超無學也直至耳根圓通觀音自稱如幻聞熏金剛三昧文殊亦言宣說金剛王如幻不思議佛母真三昧此對凡外權小依識心所修之定不成實果而今經所依根性幻修之定能成真實圓通以登無上知覺而必教其捨彼而取此也二為教彼大心凡夫能解大乘深旨知真本有達妄本空自恃天真躭著多懶無休歇志不勤定力屈於欲魔無力敵苦終無受用故勸其修首楞大定以取實果如經教阿難云汝雖歷劫憶持如來祕密妙嚴不如一日修無漏業偈又云汝聞微塵佛一切祕密門欲漏不先除蓄聞成過誤將心持佛佛何不自聞聞是則前之一義勸彼自恃餘乘痴定不知決擇真實而枉費勤苦者山林下多有斯人後之一義勸彼自恃大乘狂慧不知以定收功而孤負利根者宗教下多見是等均為要義舊註多明後義少申前義而不知前義不明則非惟林下人固守偽定不思改革而宗教下決擇未審承激勸而輙用識心之定者亦有之矣故知前義為尤要也宜珍玩之佛為勸此二種人修真實大定故說斯經七直指人心者良以吾釋號萬法惟心之宗雙開宗教二門接引羣品令悟一心而成道意無不同夫何直指人心猶屬宗門意顯教家為曲指也夫曲指則必假言詮廣列義相備明理事真妄詳開次第圓融令人尋言生解轉悟於心縱有無言放光等事皆可詮表註釋亦同有言也如佛說華嚴等一切權實法門而菩薩等各隨淺深悟解者是也直指則多離言詮玄示玄提一錐一劄石火電光瞬目便過終不與人說破但令當機不涉言詞自於身中親自見得便是入手時節縱有一言半語施設要須言外知歸非取名味亦同無言也如佛末後拈華了無言說而大迦葉破顏獨領者是也是宗則一味離言教則一味用言故直指獨屬宗門而不屬教也今斯經雙兼直曲二指非一於純用言詮故有直指人心之處不可屈抑之而不加表顯也彼於徵破妄心之後阿難求示妙明心時此正索要真心之處意同神光求達摩安心時節此時佛若廣列言詮表顯義門或舉三大或陳四德表顯相狀或說同於虗空或說周於沙界此即令人懸空想像高推佛有終不知我今現前身中何者即是斯則但是曲指而非直指今佛也不列義門也不談相狀就於阿難現前身中六根門頭指出眼中見性是心非眼分明說與此即真心不可更迷為眼根也然猶似口行人事至於次科顯其不動則屈指開合飛光左右審問阿難令分動靜阿難此時分明於自身中見得有本具不動之妙性元與搖動之身境了不相干故隨即滿口承當動靜二皆不屬更無疑滯夫如來屈指飛光已離言詮而示阿難親見不動已離思惟而領但如來多却分明審問令分動靜阿難多却分明說見雙離動靜是皆兼於曲指曲領故令人昧却同宗之妙用直指之玄機向使如來但屈指飛光而不形審問阿難即禮拜默領而不更說破管取人天百萬不知下落則何異於拈華微笑耶或曰宗師所示決是純真無妄之心統攝無餘之體今茲見性佛自明言雖非妙精明心如第二月豈即純真而況偏局真根不該萬相豈成全體若是則非即宗門所示之心顧謂直指人心未敢聞命也答如是見解敢保老兄非惟不諳宗通恐亦未知教意也夫佛言雖非妙精明心者但表眾生分上真妄和合精明未妙非謂離此別有妙精明也觀其喻第二月足顯非是二體但多一揑影而已理實惟佛具妙精明自佛以下皆同具此真妄和合之心何況一切初心離此憑何指示乎且此性近具根中而遠為四科七大之體以至三如來藏亦不外是經既呼為菩提涅槃元清淨體則何異於正法眼藏涅槃妙心誰謂偏局眼根而不該萬相乎且聖性雖云通十八界而塵為根影識又塵影獨六根之性乃為實體故宗家門庭雖別而所示多不出於六根門頭如二祖初悟謂了了常知從意根入也竪指伸拳密澄其見也棒從忍痛發覺身根也喝至耳聾令從聞入也是雖變態無端而究實令眾生自於身中親切見性其得於見聞覺知之根者良多也良由眾生從無始來已將清淨純真之心迷成十八界相而實體宛在根中如金在鑛初不相離何處更有純真之心若捨根性而指心猶捨鑛而尋金非善示眾生之性者也但宗家示而不說務令自悟斯則別為一類之機要從此無言得入者也教家說而不示令依言解斯則亦別為一類之機要從有言得入者也楞嚴兼示兼說既令親見而又令從言加解是乃普為羣機慈悲特然所謂落草之談也豈惟是指見處為然哉前示妄心亦舉拳引推令其現前而後覿面喝之後示聞性乃敕擊鐘令其親驗而後責之此特雙取說示而有似宗門直指類爾若併論言詮心性則斯經始終純指人心無別餘事請試言之阿難最初請妙奢摩他等求定力也佛不直談定力而即破妄心以指真心顯真心即大定之全體也滿慈次問生續性相辯萬法也佛不但說萬法而與談心生滅門及如來藏心顯萬法即一心之大用也及其說契入也則選以聞根助以心呪示心之顯密相資也說歷位也則本以類生轉成聖位示心之染淨相翻也敘七趣而表其根於心之內分外分辯五魔則明其由於心之邪解邪悟他如餘經談世界生起也多言起於增上業力則人謂感雖由己而體終心外物爾斯經則明風即心之生搖地即心之立礙等既離心了無一法悟法豈不全空餘經談地獄三塗也多但歸於惡業招感則人謂招雖在我而設立有鬼神爾斯經則言火即婬心之研磨冰即貪心之吸縮等唯心更非他造轉心豈不即無然則無麤無細一切皆心任聖任凡更無別物而直指人心豈有過於斯經者哉是知佛為直指人心故說斯經八雙示二門者謂平等方便二門圓實教家方能具足何為平等一心萬法本元無差平等一相所謂真妄虗實邪正是非等一切差別之相悉不可得良以一法界內惟有一真是實諸妄本空乃至一塵一毛一念一剎那無非法界全體而何法不是真性何法不徧十方若有一法非性便是真性不徧不徧即非真性亦是妄體不空不空即不成妄若有一法不徧十方便不即性設許即性而不徧十方便是理有分限其過無窮或曰若是則無聖凡無迷悟併諸因果一切都無安得不犯撥無因果之邪見答撥無者斷見為主永礙修證斯蓋達理平等為主大益圓頓修證安可與撥無者同日而語也何為方便於諸法中分真分妄辯正辯邪許破許顯有修有證等良以真雖本有而迷之已久不方便顯之則終不能見妄雖本空而執之已深不方便破之則終不能覺又縱了見分明若不作方便捨妄從真亦終不入所以初心必從是入也或曰此則真妄條然虗實逈別諸法差別灼然非一何以異於權宗答若但執此方便誤為真實畢竟真妄不融因果永異是即權宗此則不然明知萬法惟是一心一味平等而巧從方便捨妄從真及至深心普融一味是為圓家善巧方便非同權宗之誤住方便也如經後初住文云以真方便發此十心故知方便之語非定屬權宗也問斯經雙含二門何文即是請試明之答阿難權聖請處施設即以具足斯旨故既陳三名以請大定而復懇最初方便是其所志固期於圓修大定而起修方便亦彼所尅意而最重者也故佛酬此三名之請具用乎方便平等二門然或雙用或各用在文可見彼奢摩他中二門雙用也謂先用方便門決擇真妄文始於徵破識心而終於非不和合其中於識決定破其為妄心而令其捨之於見決定顯其為真心而令其取之了無平等之相故屬方便門也此則真妄既分真體既露若局此真體獨在於根不與萬法平等普融則何以發明圓理而成圓修耶故後用平等門普融真妄文始於會通四科終於普責思議其中四科七大會之則同歸藏心六塵尚然六識何擇所謂真則同真無一法而不是於真也十惑三續起之則同成妄有三細尚然六精何擇所謂妄則同妄無一法而不是於妄也至於相妄本無凌滅不傾奪則諸礙何成性真先非水火能合融則萬用齊妙由此躡示藏心之於萬法非則俱非而何分染淨即則俱即豈揀聖凡如是乃至雙即雙離所謂融則同融無一法而可分於真妄故屬平等門也無前門則真妄混淆何以尅體見真無後門則真妄永隔何以悟圓入妙故示悟性定必二門雙具也至於三摩禪那則二門各專用焉三摩提中專用方便蓋指結處獨取六根選門時更專一耳既不平等全屬方便義顯然也禪那中專用平等十信之初便言中中流入十向以去無非法法雙融既不偏取全歸平等義尤著也是則方便擇從入之妙門平等趣圓融之極果二門必相資以有成通達此者豈復有矛盾之疑哉今佛為雙示此之二門故說斯經九極勸實證者為三種人解怠一者務好多聞不求實證狂慧無歸大似說食不飽數貨常貧佛以阿難當機而種種激勸多聞無力如第四卷重問因緣其文炳然前已引明矣二者因聞諸聖深慈大力必救眾生遂恃他力但求加被怠於自修不求親證此亦用阿難表顯雖以如來為兄而身心亦不相代豈能惠賜三昧要當自勤修證然後諸聖可加如雨露但潤有根之木也三者圓頓機根見理高妙自恃天真不假修證玩留惡習了不依佛方便證入之門不揣道情未堅力不敵苦大事忽臨手足何措反貽權證者之笑矣為斯等故最初即以無力抗邪者發起大教便有激勸修證之旨及破同分見妄之尾極勸證取方為遠離發明性相之末責不勤求故無妙指如是乃至曲開巧修之門詳列歷證之位皆導其進於深證抵於實果而後已且其所立二漸即所謂別信併圓五品位矣三漸復是別之三賢圓之十信過於羅漢遠矣所謂彈指超無學也向下立乾慧以收前中十信開十心以成後之一住皆所以撮合淺位促入深心令速登分證也以此中十信即分證之初心耳尚不令淹滯於相似豈容前種人從聞無證哉至於十住似華嚴十地證同是雖二經竝同圓極決無優劣殊位而聖意錯綜自在善巧導物恐是前後合開之意闕疑在後解文中俟來哲更酌量之又於十住既以促入真修而後之諸位或恐即以促入後心其夾持速證務臻極果之意於茲立位可以觀其槩矣是尚恐其暫息中途寧許有當機者一無所證乎是則佛為極勸實證故說此經十嚴護邪思者良以娑婆世界欲坑深廣見網重繁極難頴脫是故眾生善根積集雖亦不無而習氣幽綿卒難淨盡往往利根聰慧之流銳氣苦辛之輩亦能醉心法喜凝神禪悅而中途隳廢者不為貪愛淪溺而即為邪妄支岐甚哉見思之為善深矣釋迦慈重偏愍斯流故於是經從初至末自狹向寬而所以塞絕愛坑及破裂邪網者意無不至矣初欲談大定而知婬愛為定門之冤賊故起教以聖弟誤墮婬室為緣發心以相好不由婬欲為念即以警聰敏者防欲箭而越婬坑也及其圓發三藏而定體已彰之後遂以切責歷劫多聞不如一日修無漏定以離憎愛之苦意明婬心固為亂定之冤賊而大定亦為破欲之將軍與其怖欲魔而沉湎於聞孰若拜禪將以剿絕於欲哉又於諸聖圓通之後文殊偈選之中深責阿難強記不免邪思欲漏不除蓄聞成過又於華屋得門之後道場請式之前四律縛其賊首三學搗其巢穴壇制峻其隄防呪心絕其種類是皆所以驅邪思使無所容而護正覺令無所擾也及其談證位也漸階則首申戒品以止絕諸非入位則畢護定心以住持正慧遂令四十一心心心斷惑五十五位位位證真而始終無退屈也如是乃至備明七趣則示以三惡劇苦令其慎惡因而勿犯也示以四善終淪令其捨樂果而勿貪也詳辯五魔則警覺外魔窺伺戒其勿縱邪解以招致也闡揚內魔伏藏戒其勿起邪悟以引發也最後重明五陰無非妄想始終警戒邪思故知如來為此嚴護邪思故說斯經通上十義論之云究廢立則超權入實開知見則自心即佛達實相則萬法即心了相常則本無生滅入佛慧則果終圓極得真定則不勞把捉直指心則親見本真明二門則性修無礙期實證則不止半途護邪思則永無破壞然前四與六七極顯性具五與後三曲遂修成而節節皆圓實宗殊勝了義誠所謂莫大之因緣豈同區區逐節無謂之語哉具眼者味之所為因緣竟四義理分齊者文之實曰義事之主曰理又義者相也理者體也由是聖人之設教也理以統之義以析之理雖至一而逐機遂有淺深義雖成多而歸理則無別體是則諸經義理既有淺深而明經者不辯別之何以知其分齊之所詣乎斯經義海所遵即起信疏全文夫賢首命世宗師誠可尊尚然彼文既具何勞全錄述略指廣可也彼開有二一約教通局二約法生起約教中從淺向深有五重一約小教單說人空但依六識三毒二約大乘始教謂空宗有遮無表亦名分教分者限也謂相宗有不成佛三約終教以終收始說如來藏隨緣成賴耶識不但皆空而一切皆如也亦名實教以實廢權說一切眾生悉當作佛也四約頓教惟性無相亦無漸次訶教離念即心即佛也五約圓教統一法界性相圓融身剎塵毛重重即入也此但略引廣在彼文若於五中顯此經之分齊則經中所指根性近具根中徧為四科七大體性即如來藏真如隨緣所成陀那細識乃賴耶別名而異生翻染小乘向大皆當成佛正屬終實之教而歇即菩提圓照法界兼屬頓圓二教若以教攝經五惟後三攝此若以經攝教則此可全攝彼五以不廢小教果法戒品而兼存始教八識三空故也二約法生起中從本起末亦有五重淺深然所約者即起信論文而分屬者亦不離於五教但從深至淺別於前門耳初惟一心為本源即一真法界該四法界此圓教分齊也二依一心開二門即該二教一心真如門即頓教分齊也始教中空宗亦密說此門二者心生滅門即終教分齊三依後門明二義一覺義二不覺義四依後義生三細一業相二轉相三現相即始教相宗分齊以彼宗不達此等與真如同依一心為源故說真如不許隨緣生法惟齊業識縱轉成智亦終有為而不同真五依最後生六麤一別境二生受三著受四計名五造業六受報第三小教分齊第五人天分齊此亦略引廣在彼文若於此五中顯斯經深淺則文既雜明真妄而會妄歸真從真起妄與夫真妄和融等參而詳之大分實惟齊於心生滅門不違前終教分齊若更細研會妄既皆歸於妙真如性則亦兼齊於心真如門亦不違前兼屬頓宗從真既以起乎三細六麤此正顯然齊於心生滅門而為終實之意然真妄會合既以妙極於四法界心三如來藏則亦兼齊於一本源心亦不違前兼合圓旨是知斯經也揆義取類殆於法華圓覺華嚴同條共貫其亦甚深無上之典而表以佛頂斯其至矣乎義理分齊竟五教所被機者應分通局即收揀也但尋常揀去其非機此謂揀擇乎當機也通被者以終實教意明一切眾生凡有心者皆當作佛斯經既說得成菩提之法而何人不當被哉如經云一切眾生從無始來生死相續皆由不知常住真心用諸妄想又云一切眾生業種自然如惡叉聚諸修行人不成菩提乃至別成聲聞緣覺諸天外道魔王皆由不知二種根本錯亂修習等由此而推佛心豈不普欲眾生用真心捨妄想以盡明乎二種根本哉問若此無所擇揀而眾生有不信順者豈亦當被乎答有例亦當被也如常不輕強為不信順者授記縱因謗墮獄仍成法華遠劫因緣如是則無一人而非此經之當機通之至也何為而復有局被乎以通中攝生雖廣論益則多遠因緣而非近益若惟取於隨聞而益機理相契如彼啐啄同時則不得不局取之而不容濫收也然此中有二準知一者據文考證二者以意推度今初據文考證者斯經阿難當機即以示在聲聞之位而切詳如來節節敘其所為者多為接引小乘迴小入大經云汝先厭離聲聞緣覺諸小乘法發心勤求無上菩提等是也於中自有四類一為有學聲聞經云憐愍阿難及諸會中諸有學者又云亦令將來諸有漏者獲菩提果是也二為無學聲聞經云告富樓那及諸會中漏盡無學諸阿羅漢是也三竝為緣覺經云哀愍會中緣覺聲聞於菩提心未自在者是也四竝為定性經云令汝會中定性聲聞及諸一切未得二空迴向上乘阿羅漢等是也問定性必不信順何收局擇之中答現在會中隨請隨聽非畢竟退席者故亦正當機也良以此等小乘歷劫遭苦求出無要展轉拙修勤苦無量最以動佛慈愍況皆智勝遺塵世世與佛俱生多係親豈惟慶喜觀經題名救護親因其意可見近被法華始知信求故斯等顯當正為之機也其次以意推度者經中雖未明言直指以意度之小乘初迴向大之心佛尚諄諄為彼發揮入大之門其有純淨大根了無小乘種習佛必更為之深也但為急救小根故逐節先言為小而為大之意俱含於一切之中如經云吾今為汝建大法幢亦令十方一切眾生獲妙微密等又云及為當來佛滅度後末法眾生發菩提心開無上乘妙修行路等又云亦為未來一切眾生為出世因作將來眼夫既屢言一切眾生而又言末世發菩提者則知不止獨為小乘一類而竝為大心凡夫及始教入位者也此中則應具於六類謂權乘二而圓實四也權乘二者謂大乘法相宗人動執法相而不能以性相融大乘破相宗人觸言賓無而不達藏性妙者此正欠明斯經十大因緣安得不正以為之圓實者上根凡夫復無權乘種習惟依最上乘發菩提心者也此根更為純淨佛正為之不言可知問彼既知權小非真純發大心不勞破顯斯經何所益於彼乎答既曰上根凡夫明是立志雖大發心雖普而未得開悟之要訣證入之妙門斯經直指雙示等因緣豈不正為之乎此中自有四類謂帶過三而無過一也帶過即前第九因緣中三人也一恃他加被二恃聞忽定三恃性忘修者也無過一者即無前三過者也雖求加而務親證雖多聞而恒在定雖悟性而極精修秪欠徹悟而證入此最上第一妙根極為當機者也若聞斯經真如時雨化禾春雷躍鯉莫之能禦也此雖至勝通前五種皆是大乘當機舊於前五皆揀非機不知據明言二乘顯然正是當機而大根何反非機若曲揀其病則斯經正是應病之藥豈不機教相對若避病而不敢治安稱良藥何況二乘深病尚起其危而大乘微恙豈不一劑而愈哉故經明敘二乘當機而不顯標大乘者正表難治者尚能治之而易治者不待言也是故通前共有十類均是當機且觀音自陳本行文殊亦表同修而偈云過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是人是則三世大乘通依之正軌而十類未足多也教所被機竟六能詮教體者賢首疏起信論略作四門清涼疏華嚴承演十門亦不過開四而已長水著楞嚴義海亦承用賢首略門今亦從略列彼四門一隨相門此依長水復為二一但取能詮體謂聲名句文假實相資不可偏廢以佛在聲多佛滅紙墨之教名句文多也然亦附六塵同為教體不獨聲等二合所所詮體以徒文無義非教故文義相從而不相離方成教體二唯識門攝前之境以從於心亦二一本影相對謂說者淨識所現文義為本質教聽者識上文義相現是影相教也二說聽全收可知清涼承演本影相對四句分四教謂小惟本始本影終惟影頓雙非也又承演說聽全收八句分二教以生佛相收屬同教而生佛相在屬別教意顯圓融不礙方為甚深惟識三歸性門惟依賢首云此識無體惟是真如故下文云一切法從本以來離言說相乃至惟是一心故名真如清涼引唯識釋勝流真如所流教法最為殊勝故也予謂淨名言無離文字而說解脫亦此門意耳四無礙門賢首謂於前三門心境理事同一緣起混融無礙交徹相攝以為教體以一心法有二門皆各攝一切法故予謂以生滅門收隨相惟識以真如門先收歸性却前門成心境無礙而後門成理事無礙矣清涼承演理事與事事二無礙門末乃歸於海印三昧亦極盡無礙之旨以收屬當經耳今斯經既正屬於終實而兼涉圓頓則於賢首清涼所判全門教體皆𠃔協也能詮教體竟七宗趣通別者賢首釋云當部所崇曰宗宗之所歸曰趣清涼以宗為語之所尚而趣同賢首二師皆具通局兩門通指一大時教局謂專取本經通中徧約諸教開門頗多不能繁引今但自約總意取之夫五時之教權實可以略分權乘多重修成動張因果則因即宗而果即趣也圓實多重性具首明悟入則悟即宗而入即趣也斯經若泛就圓實一類之教以取宗趣則亦以悟明心地為宗而證入果地為趣斯亦略盡其槩矣然二師局門義亦浩繁今局斯經本載文義而取安趣亦略出其少分須分總別總謂以圓定為宗極果為趨也良以阿難所請妙奢摩他等而如來所示三如來藏心即性真圓融大定豈非一經之所宗乎阿難所請十方如來得成菩提而世尊結示入於如來妙莊嚴海圓滿菩提歸無所得即十方佛究竟極果豈非一經之所趣乎問此與權乘因果何別答所示大定但取性具全由悟門而所取極果亦但擇一妙門一超直入所謂是了因之所了非生因之所生較之權乘天淵不同矣問後歷證文位何所用乎答但顯圓融不礙行部實非三秪漸證豈不聞利根一生事辦兼之經終五陰破後初住方成如來明許從互用中超諸位盡深研此意可自見矣若更詳盡別意應有六對謂破顯偏全悟入體用行位分滿也皆先宗而後趣又皆躡前對之趣作後對之宗而復起其趣也一破顯者徵破識心為宗顯發根性為趣言委曲破盡識心意在令其舍識心而發明六根中性也二偏全者偏指根性為宗全彰三藏為趣此即攝前顯發根性中先惟種種偏明見精圓妙者意在從近至遠全彰四科七大為空藏十惑三續為不空藏四義三藏為空不空藏也三悟入者圓悟華屋為宗得門深入為趣此亦躡前全彰三藏即是圓悟華屋言所以必求圓悟華屋者意在得圓根一門從初入流直至寂滅現前也四體用者證圓通體為宗發圓通用為趣此亦躡前一門深入即證得圓通之體然必證此體者意在發圓通三十二應等大自在用也五行位者運圓定行為宗歷圓因位為趣此亦躡前圓通大用正圓定作略然此作略有二一能利眾生二能取佛果前三十二應但彰利生用而影取果用今言運圓定行者躡其取果用也言必運其圓定之行者意在徧歷圓因五十五位也六分滿者歷分證聖位為宗取圓滿菩提為趣此亦躡圓因之位即分證位言必歷分證之位者意在圓滿無上菩提也達此由悟而入由入而深由深而極一經趣進了然在目圓融次第二無礙矣宗趣通別竟八科判援引者詳古人立科判以解經極為成式猶公輸之規矩準繩數萬言經捨科判而逐文汗漫釋之何異捨規矩準繩而取方圓平直未之或中也大約其用有四一者本有科說主於本文中自分者也如五陰六入等現具經文解時須順分之二者分文科謂文句繁長若不詳其文勢而分截之則易成攙亂故前後節斷令其分劑分明不相逾越亦可名分劑科譬一統分十三省諸省又各分為若干府諸府又各分為若干州縣等從寬至狹自少成多各有統系故舉州縣則知其屬於何府舉府則知其屬於何省而各有界限不相混濫矣然不同上之本有此疏家因文分屬而立如本疏所立十番顯見等科是也三者約義科謂文中所詮之義有相對待應合者如身心包徧依正之類文中不甚顯著則約義分之令其顯現如身心蕩然等文中所分之科是也四者生起科謂說主語脉次第生起文義譬如樹株初以一本或分二支或三四支等是為大支諸大支復各出諸中支而中支又各出諸小支等雖至最小之支仍可尋知自何大支而出若非科文明其來處安可尋究乎此如天親判金剛二十七疑本經如答五大圓融科中舊解全失語脉不相接續新疏出其伏疑加以脉絡之科方知來意是也然製科最不宜行輩錯亂譬如人家宗派一祖元所生者或三子或五子其子各所生者或多或少皆是孫輩不得僭子而孫所生者又是曾孫不得僭孫天台賢首清涼能曲盡其妙近世如要解等全不諳此於一輩間動分十七八科或二三十科及細察其所分則高祖與子孫乃至曾玄皆同列為一輩全無尊卑統屬何取於分也今疏病懲此弊所分之科務令自大降小從少增多慮古科但以疏為次第無字號以別之而講者多迷乃以十干十二支置於圈內題於科頭如甲為父則乙為子丙為孫則丁為曾孫令其行輩炳然不相僭亂凡於大科盡處則結云某大科已竟則永無迷科尋覓之勞後之刊者務請屈從無以為異常而不用也援引有四一經論二本經三祖語四舊註疏中為避繁文所引經論及本經多撮要略而全文極少祖語亦然至於諸師舊註倘於佛旨有未順者則或默然不從或顯然辯正皆非作意而樂於為此蓋必不得已而後如是也外此而一存一句符文順義者則必不敢遺必不敢隱至於道場表法說呪利益與夫十二類生十習六交等文既不勞於異說多全取於諸師舊註皆以顯題字號全文不無亦有於繁雜處而少加裁省者必不損其本意於文盡處若更加以本疏之文則以一圈隔之合其有所別也科判援引竟九通釋名題十別解文義此之二門不煩預贅入疏方陳順古十門但標虗目今更總束前文直出斯經要義以見其特異於諸經諸論而獨為顯了親切也其目有四一者決定不用識心以其與大定為生冤家眾生於斯少有執吝則於真心大定終不可見何況能成以此識詐現心相而實非心詐現定相而實無定卒以障盡真心本定令凡外權小如生盲也他經他論雖亦說其為妄而其言總略實未至於善惡竝遣動靜雙袪故眾生雖賤乎劣惡思惟而猶貴乎勝善思惟雖捨夫散亂意識而仍取夫寂定意識既全執似必不識真而真心本定何由見哉惟斯經也悟佛法音尚猶斥其非實豈留勝善思惟九次第定終不許其為真豈存寂定意識方於斯識破之究竟無餘矣是則佛之破意不暇論於劣惡散亂乃直偏取於勝善寂定者而破之正恐其修大定者惑於似是之非而終不進悟於真心本定也嗟今之人取靜修行止念為定者未有能出此識之圈圚者也將謂斯定易成而生苟就之心豈知修時百計難成成之畢竟非實譬如結冰以作琉璃其難其偽類可知也奉勸慕楞嚴者順佛言而速疾捨之方於大定可希冀矣二者決定認取根性以眾生根性即是真心亦即自性本定此由眾生將全分如來藏性迷成十八界而其實體在六根中六塵但是根影而六識又是塵影眾生反認至虗識心而全昧至實根性顛倒莫此為甚且他經他論泛泛發明真心體相名義而不言眾生現前身中何者即是故眾生縱能捨乎分別麤心而亦多求乎玄妙義相慕於高遠境界遂擬真心為冥漠難知之境恍惚不定之相而或研思極精以體會之則依舊墮於微細意識而流於權小境界不自覺知矣惟斯經也菩提涅槃元清淨體徑指六根安樂解脫寂靜妙常更無他物且其屈指飛光而不動搖之見性朗然現前擊鐘引夢而無生滅之聞根湛然常住此竝當風指出非獨言句發揮且其仰瞻日月洞明四萬由旬遙聽雷霆周聞三百餘里何況十番顯妙三指真實極為奇特若竝收乎暗中之見靜裡之聞則廓爾無邊包含沙界悉是眾生現量非有待於六通且其一切諸色悉同燈上重輪一切諸聲皆類頭中虗響故知根性是萬物之實身萬物乃根性之幻影而重玄極妙之真心豈離見色聞聲之常性哉然雖至近至明可中難信難解不是幽微叵測但由日用不知故諸祖不肯道破如來常不開演良有以也問若此親切明白佛祖何故不常開演不肯道破答恐非機聞之真與非真二俱成迷故非真迷者聞之而不信其為真也謂有眾生冥搜玄妙而輕謾目前者聞說六根即是將謂見色但是尋常聞聲有何奇特既不委信必不認取如阿難五卷尚猶別請結元會解十家悉以顯見為破者是也不知元妙元明豈非正法眼藏本常本寂應即涅槃妙心當知離此性外尚無片事可得豈復別有玄妙哉真迷者聞之而倚真不復加修也謂有眾生自恃天真不求究竟者聞談根性現成或死守寂常本體而修證全捐或但住初解人空而得少為足不知根結未銷豈能脫情界而出諸苦生滅未滅安得超器界而證圓通大似守金鑛而甘貧閉化城而迷寶又豈可哉以是真與非真二俱成迷故佛祖常不開演而幸遭斯典者速宜認取根性而更求解結方為得旨矣三者決定不用天台止觀以諸家判三觀處元是如來開示眾生本有真心性具妙定始目眼根指出展轉通貫萬法仍令圓悟萬有總一如來藏性顯其未及加修而人人早先具此楞嚴妙體但惟教其悟明此之性海以為後文圓通入處而已本不曾立觀門教修習也而諸家瞢然強安三觀若本元立三觀則是前文全說修門何阿難後又請修華屋之喻豈亦但喻修門而非喻藏性乎又豈所答一門深入却又深入彼之修門而非入藏性乎是皆大不通也當知斯經所以大異於眾典者正以其指心在根斯定之所以大異於諸定者由說自性本定也若謂前文是說修門全障性定且又礙後耳門妙修無有用處所以修楞嚴者決定不用三觀也嗟今沿習既久而業楞嚴者無一人不搜索三觀似但借經為敲門瓦子而正惟發明天台止觀而已畢竟令觀意獨明而經意障盡矣何迷痼支離亦至於是哉痛刮洗之可也問經傳此土千五百年豈無一人見同於此而子獨異說太煞驚人恐多信之不及復有何說以安慰之乎答智者大師不及親見使其親見決不誤以說性為說觀亦決定不以己觀自滿而顧仰經同己不然何故虗心拜求一十八年乎是則過全歸於後人之混淆而大師無與也清涼圭峯於華嚴圓覺各專其業無暇詳釋於此至於宗門悟心大士非皆不知但緣經文指心在根太煞明白恐成世諦流布難以接人是則十成之語尤為傳宗者所忌故多默而不言縱有一二拈提隨拈隨掃終不令成詮釋觀靈源之訶弘覺範則其意可見又或前古說楞嚴者未必如今時盛宗三觀以掩佛說性之文故吾言未必盡異於古人特緣近古似量騰心雷同錯誤故獨顯吾言為特異耳彌天之罪安敢避哉問子疏何不忌於世諦流布答此有二意一者教須說到不同宗門何嫌流布二者祖庭秋晚現量證悟者無人可接祕之何益不如道破令其經耳成因也祖師末路評唱令其傳習亦此意也問不成現量證悟經傳何益答能令多分中上根人成真比量發大解悟與現量證悟作勝因緣然亦應有少分上上根人成現量證悟是不敢定也此由叔季之世故作是說若古宗門由聞經而悟入者何限哉四者決定推重耳根圓通問業楞嚴者誰不知此為最初方便何勞又推重之答是何言歟自近世盛宗三觀則人人惟知推重三觀謂其為楞嚴正修而解家拳拳插入諄諄發明至於耳門視為啟蒙初進之法隨文略釋而已誰見其深研廣釋而極勸專修者哉且子謂人人皆知重此子必深達斯旨試指何處是圓通之文其人笑曰觀音自陳初於聞中等文以至文殊選擇之偈經有明文有何難見答此下智隨言生解之知敢曰不難見哉若是中人之智自知從四卷後半第一決定義中所推不生滅圓湛之性即此聞根之性及第二義中指明根結密揀圓通乃至擊鐘引夢諸佛證明綰巾示結等文皆是說根性法門但未顯定何根為至圓而當專修也此猶中人所知若更有上智徹通之見當知破識之後所示見性即是首薦根性為真修之本而見聞無有異體故十番顯見亦是顯聞而語中亦帶聞字如阿難云若此見聞必不生滅等是也但見精對境朗照萬象常住不動楞易開悟故前文偏顯之聞性離相周聞十方越牖透垣最益修攝故後文偏用之是知自指見是心直至破非和合即是開示圓通中聞性之體豈有別體乎又極而言之此文之前最初破識即是徹去圓通之障以識心若不捨盡決不知別有根性根性猶然不知圓通何自而修哉此文之後四科七大乃至三如來藏十法界心無非根性之極量而非別有一性也修圓通者若不達此豈知反聞之中統該萬有極盡一真乎大抵開示本具藏性正為後圓通作入處耳不然後門所入之華屋更是何法乎是則未說圓通之前尚皆不出圓通之性而況既說圓通之後豈更有異法乎是故道場定慧是此無疑三漸反流離此何入初住十心明言一切圓通而等妙菩提亦但圓通究竟而已觀佛結云此皆以三增進故善能成就五十五位其意可見以三增進但牒圓通而已是斯經也前半全談藏性所以開發圓通後半全說圓通所以修證藏性一經始終皆為圓覺豈惟觀音數語文殊數偈而已哉至於破五陰辨五魔而猶節節警云違遠圓通背涅槃城如是全經宗要而惟以一三觀蔽盡無餘烏忍於默而不言哉問圓通既稱初心方便過此必有別法乃為深修今何言其盡始終而更無別法乎此猶甚可疑也請明其故答諸家正同此惑而子之斯問亦緣舊習所染疑根未盡拔耳今與拔之其故皆由初心二字未明其對何法而說初心妄說三觀方為深法而經之初心必與三觀為初心也却見佛前文所說奢摩等名數偶合如來藏義其相又似遂謂其必是三觀由是判前三藏為通請三觀深位妙修判後圓通為別請一門初心始入後學遵之以為確論誰敢動移不知斯判前則誣性為修後則貶深作淺而且初意未明淺深失序是大差誤非確論也茲當極伸正義令後學永無惑焉夫誣性為修前已極明義無不盡而後之貶深為淺者以前三如來藏若據理性則是徹法底源譬如太空豈有深淺可判若約當機領悟於此者不必論其宿根利純但惟取其多分而於天台六即位中多但超於理即正在名字即中以其未涉觀行故也至於圓通則由觀行即歷相似即而後達於分證即之初位據本經即當三十二應等神用現前據華嚴即當百佛世界中分身成道其視前位何異天淵今反謂其淺於前位則貶深作淺之過安可迯乎問若此而佛何謂之初心方便乎答我謂彼之初意不明者正當此際明之以此圓通功滿方於五十五位中初證一位對後五十四位此為初心豈對前文謬判三觀而與其作初心乎且此初心遙應妙覺乃為究竟大經云初心究竟二不別如是二心先心難又此初住名發心住故經又云從初發心即成正覺若是則此之初心良非淺淺我謂圓通徹究竟位亦非無見而云然也夫何謬謂三觀在前而反深圓通在後而反淺豈不大失其淺深之序耶奉勸求大定者博究精研耳門修法而力行之無使毫髮濫於三觀則圓通方可希冀矣問智者為一宗祖師三觀為圓頓修法今言依之則障盡全經修之當莫濫絲髮然則天台立觀不合圓頓教旨耶請言何教所收答此更別有二意人所難知非謂三觀不合圓頓一者佛談性具三藏本不曾立乎三觀而註家錯引三觀以會釋之不辨明則以修障性故不得不辨二者反聞修法不用覺觀思惟而三觀豈能不用濫之則須廢反聞故不得不禁是三觀非不合於圓頓教旨但不合於楞嚴修門耳當知每於一教攝多法門所以法門無量豈因門之不同而遂謂教之亦異乎問二門均是圓頓深教亦有優劣否耶答子謂天台何如二十五聖曰大師必不自欺自言方在五品安得遽齊諸大聖耶曰文殊獨選耳門則二十四聖修門皆不能齊豈一天台修門所能齊乎且經旨觀旨多種不同而舊註混同曾無皂白無怪其以彼而濫此也今與略分析之有四不同一者此經首破識心令終不用不識天台初談三觀亦先破識而教其不用否耶然藏中曾見天台家所傳心印首先不計揀去六識而別求真心是與經旨大相反矣此其一不同也二者此經次示根中性體即妙明真心不識天台指示真心亦言惟汝六根更無他物否耶縱其所立三諦彷彿似於三藏而其當風指出初未薦乎六精此其二不同也三者此經起修了揀諸門惟選耳根一門深入不識天台三觀起修下手亦專一門否耶蓋彼泛立三諦起三止觀而所示真心初不指在根中何有專門此其三不同也四者耳根之修一反聞間行起解絕頓離分別初無多事最為簡易豈有繁難不識天台觀門亦如耳門之簡易否耶蓋彼立三諦而起三止三觀以修之已自先成九法及說三觀復各為三所謂一空一切空無假無中無不空等亦成九法合滿十八法數是雖成熟終歸一心而本其造端以較之惟一反聞者其繁其簡宛爾天殊此其四不同也問經前三藏具含十界豈不繁難答彼是廣談性理開其知解雖博非繁及至行起便乃解絕惟一反聞具收眾妙汝應以此行對彼行而辨其繁簡何乃取解而難行乎此固舊註混濫之故習也今更相對顯之經以三藏開解而從一門起修天台以三諦開解而從止觀起修則經之三藏正對天台三諦經之耳門正對天台止觀何得仍前錯誤而以三藏對三止觀乎通前四義了揀則台宗與經旨元不多同但惟所立三諦略彷彿於三藏而註家又復不知以諦對藏同是明理性而開知解固乃錯對止觀而以性為修謬謂意旨全同安得不晦其本旨而礙後之妙修乎若必謂斯經全是三觀則如來說法當不及於天台何以故破識指根迂遠而不如天台直切徑談故四科七大十惑三續乃至三如來藏皆但泛論性相而不如天台分明判分止觀故起修下手偏局耳門不如天台完全具十八法數故修楞嚴者不如捨經而但習天台止觀乃為捷徑何必於落落不合文中搜索一二相似之處以強明止觀乎是則以經文而發明止觀既不如止觀詳暢以觀文而強合經文豈能令經旨顯現哉是必晦其本意無疑矣我故謂止觀若不捨盡則圓通決不發明亦猶識心若不捨盡而根性決不顯現耳又二宗修法相乖亦係根識之別蓋經旨首破六識正由反聞時要須全離覺觀台宗不簡識心正由作觀時不免起於思惟故修圓通者稍涉台觀即依舊墮於識而障乎根則夫經前破識指根之文豈不俱成無用乎具金剛眼睛者幸一辨之近於宗鏡錄四十四卷中見其極明六根中性即本來心且取前之見性後之聞性同一圓通悉歸宗鏡何曾說前破妄見後但淺修哉又何曾說中間有三觀為深法哉斯可極證吾疏而并可以驗古人不盡同於十家之見也幸檢閱之是則攝前多義而但成四決定義已極簡要若更束之則但成十字前二攝盡經義成捨識從根四字捨識易知從根者前半從根悟入後半從根修證而已後二攝盡經義成揀止觀重圓通六字蓋舊註全重台宗止觀今疏揀明全非台宗止觀舊註既重止觀必輕忽於圓通今疏既揀去止觀全推重於圓通極勸專修而已然推重專修非己私意釋迦文殊及十方如來明命特旨也請反復研味文殊之偈當自見之又復當知此中揀止觀者但揀其非台宗止觀而已非謂圓通全非止觀當知圓通仍是不涉思惟最簡妙之止觀大非台宗可比疏中備明此意今特為近習多濫台宗故不如但順經文呼為圓通不必釋成止觀為得矣皈敬三寶請求加被偈稽首本師說法主異口同音諸世尊佛頂顯密首楞嚴即非十界如來藏圓通本尊觀自在各入圓明眾聖賢三尊威力默加持祕旨微言令開發註釋不違於本意始終語脉得融通契機契理契佛心於佛智海同涓滴儻獲管窺符聖意流通緣具速傳持見聞現未結良因同證聞熏不思議
